<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nakhon Amulet</title>

    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;

            /* พื้นหลัง */
            background-image: url("Nakhon amulet.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            /* ให้พื้นหลังเลื่อนตามหน้า */
            background-attachment: scroll;
        }

        /* กล่องเนื้อหา */
        .container {
            text-align: center;
            color: white;
            padding: 100px 20px;
            background: rgba(0,0,0,0.4);

            /* ทำให้ยาวเกิน 1 จอ เพื่อให้เลื่อน */
            min-height: 200vh;
        }

        h1 {
            font-size: 36px;
        }

        p {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ยินดีต้อนรับ</h1>
        <p>เว็บไซต์ Nakhon Amulet</p>

        <p>เลื่อนลงเพื่อดูเพิ่มเติม</p>
    </div>

</body>
</html>
