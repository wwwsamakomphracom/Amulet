<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAG Verification</title>

<style>
/* reset */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(#444, #777);
  color: #000;
}

/* header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
}

.logo {
  height: 36px;
}

.menu {
  background: #222;
  border-radius: 20px;
  padding: 6px 14px;
  color: #fff;
  font-size: 18px;
}

.lang img {
  height: 18px;
  margin-left: 6px;
}

/* title */
.title {
  text-align: center;
  font-size: 34px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.4);
  margin: 30px 0;
}

/* content box */
.box {
  border: 2px dashed #2b6cb0;
  border-radius: 12px;
  padding: 20px;
  margin: 16px;
  background: rgba(255,255,255,0.1);
}

.box p {
  text-align: center;
  color: #1a365d;
  font-size: 18px;
}

/* description */
.desc {
  padding: 0 20px;
  margin-top: 10px;
  font-size: 15px;
  line-height: 1.6;
}

/* search */
.search {
  margin: 30px 20px;
}

.search label {
  display: block;
  margin-bottom: 6px;
  font-size: 16px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: 3px solid #d4a017;
  font-size: 16px;
}

.search button {
  margin-top: 12px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: #2b6cb0;
  color: #fff;
  font-size: 16px;
}

/* footer */
.footer {
  margin-top: 40px;
  background: #111;
  color: #d4a017;
  text-align: center;
  padding: 20px 10px;
}

.footer small {
  color: #ccc;
  display: block;
  margin-top: 6px;
}
</style>
</head>

<body>

<!-- header -->
<div class="header">
  <img src="logo.png" class="logo" alt="TAG">
  <div class="menu">☰</div>
  <div class="lang">
    🇨🇳 🇺🇸 🇹🇭
  </div>
</div>

<!-- title -->
<div class="title">SILVER CARD</div>

<!-- box 1 -->
<div class="box">
  <p>ไม่พบข้อมูลบัตร</p>
</div>

<!-- description -->
<div class="desc">
  พระเครื่อง วัตถุมงคล ชิ้นนี้ ได้รับการตรวจสอบจากสถาบัน TAG  
  ขอรับรองว่าเป็นพระแท้ตามมาตรฐานสากล พร้อมรับซื้อวัตถุ
</div>

<!-- box 2 -->
<div class="box">
  <p>ไม่พบข้อมูลบัตร</p>
</div>

<!-- search -->
<div class="search">
  <label>เลขบัตร</label>
  <input type="text" placeholder="">
  <button>ค้นหา</button>
</div>

<!-- footer -->
<div class="footer">
  <div>TAG</div>
  <small>© Copyright 2023 Thai Amulet Guarantee. All rights reserved.</small>
</div>

</body>
</html>
