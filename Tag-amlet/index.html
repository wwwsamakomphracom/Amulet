<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ตรวจสอบใบรับรองพระแท้ | TAG Amulet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #5f5f5f;
      color: #000;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #6a6a6a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card.dashed {
      border: 3px dashed #2c7ecb;
      text-align: center;
      color: #2c7ecb;
      font-size: 18px;
      padding: 60px 10px;
    }

    h1 {
      font-size: 18px;
      line-height: 1.6;
      font-weight: normal;
      color: #000;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: 3px solid #e0b05a;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border-radius: 999px;
      border: none;
      background: #2c7ecb;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    button:hover {
      background: #1f65a8;
    }

    .footer {
      text-align: center;
      font-size: 13px;
      color: #eaeaea;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>
        พระเครื่อง วัตถุมงคล ชิ้นนี้ ได้รับการตรวจสอบจากสถาบัน TAG  
        ขอรับรองว่าเป็นพระแท้ตามมาตรฐานสากล  
        พร้อมรับซื้อวัตถุมงคลชิ้นนี้ในราคาที่ทางสถาบันประเมินไว้
      </h1>
    </div>

    <div class="card dashed">
      ไม่พบข้อมูลบัตร
    </div>

    <div class="card">
      <form onsubmit="goVerify(event)">
        <label for="tag">เลขบัตร</label>
        <input 
          type="text" 
          id="tag"
          placeholder="เช่น TAG725538266"
          required
        >
        <button type="submit">ค้นหา</button>
      </form>
    </div>

    <div class="footer">
      © TAG Amulet Verification System
    </div>

  </div>

  <script>
    function goVerify(event) {
      event.preventDefault();

      const tag = document.getElementById("tag").value.trim();

      if (!tag) {
        alert("กรุณากรอกเลขบัตร");
        return;
      }

      // ไปยังหน้าที่คุณสร้างไว้จริง
      window.location.href = "https://verify.amulettags.online/" + tag + "/";
    }
  </script>

</body>
</html>
