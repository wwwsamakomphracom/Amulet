<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakhon Amulet - ใบรับรอง 3-6743</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Tahoma, sans-serif;
      color: #fff;
      background: #000;
      text-align: center;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 12px 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    .navbar a:hover {
      color: gold;
    }

    /* Header */
    .header {
      margin-top: 60px;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }

    .header h1 {
      color: gold;
      font-size: 22px;
    }

    .header p {
      margin-top: 5px;
      font-size: 14px;
    }

    /* รูปใบรับรอง */
    .certificate {
      max-width: 100%;
      height: auto;
      margin-top: 10px;
    }

    /* รองรับการเลื่อน */
    .wrapper {
      min-height: 120vh;
    }
  </style>
</head>

<body>

  <!-- เมนู -->
  <div class="navbar">
    <a href="#">หน้าแรก</a>
    <a href="#">ค้นหาใบรับรอง</a>
    <a href="#">ติดต่อ</a>
  </div>

  <div class="wrapper">

    <!-- หัวข้อ -->
    <div class="header">
      <h1>ใบรับรองพระแท้</h1>
      <p>รหัสใบรับรอง: 3-6743</p>
    </div>

    <!-- รูปใบรับรอง -->
    <img src="./3-6743.png" alt="ใบรับรอง 3-6743" class="certificate">

  </div>

</body>
</html>
