<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>วัดโบสถ์อินทรสารเพชร</title>

<style>

/* ⭐ พื้นหลัง */
body{
margin:0;
font-family:Tahoma, sans-serif;
color:white;

background:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("img/poster.png");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* ⭐ เมนู */
.menu{
display:flex;
gap:14px;
padding:14px;
background:rgba(0,0,0,0.85);
position:sticky;
top:0;
z-index:9999;
overflow-x:auto;
white-space:nowrap;
}

/* ⭐ ปุ่มเมนู */
.menu a{
padding:12px 22px;
font-weight:bold;
font-size:18px;
text-decoration:none;
color:#5a3a00;
background:linear-gradient(145deg,#fff4b0,#ffd700,#d4af37);
border-radius:14px;
border:2px solid #b8962e;
box-shadow:0 6px 14px rgba(0,0,0,0.6);
}

/* ⭐ ปุ่มภาษา */
.lang{margin-left:auto;display:flex;gap:6px;}
.lang button{
padding:8px 14px;
border:none;
border-radius:8px;
background:#b8860b;
color:white;
font-weight:bold;
cursor:pointer;
}

/* ⭐ โลโก้ */
.logo{text-align:center;padding:20px;}
.logo img{width:130px;}

/* ⭐ ชื่อวัด */
.name{
text-align:center;
font-size:34px;
font-weight:bold;
text-shadow:0 0 12px rgba(0,0,0,0.8);
}

.eng{text-align:center;margin-bottom:20px;opacity:0.9;}

/* ⭐ รูปวัด */
.temple img{
width:100%;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* ⭐ ข้อความ */
.text{
text-align:center;
font-size:24px;
font-weight:bold;
padding:30px;
text-shadow:0 0 10px rgba(0,0,0,0.9);
}

/* ⭐ วิดีโอ */
.video{text-align:center;padding:20px;}
.video video{width:95%;border-radius:12px;}

/* ⭐ ปุ่มแดง (เด่นขึ้น) */
.menu-btn{
display:inline-block;
padding:18px 30px;
margin:14px;
font-size:22px;
font-weight:bold;
color:white;
background:linear-gradient(145deg,#ff0000,#8B0000);
border-radius:16px;
text-decoration:none;
box-shadow:0 8px 22px rgba(0,0,0,0.7);
}

/* ⭐ ส่วนต่าง ๆ */
.activity,.abbot,.donate,.map,.contact{
padding:60px 20px;
text-align:center;
scroll-margin-top:90px; /* ⭐ กันเมนูบัง */
}

/* ⭐ กล่องกิจกรรม */
.activity{
background:rgba(0,0,0,0.65);
border-radius:18px;
max-width:900px;
margin:auto;
}

/* ⭐ ธนาคาร */
.bank{
background:rgba(0,0,0,0.7);
padding:18px;
margin:14px auto;
border-radius:14px;
max-width:420px;
font-size:18px;
}

.album{display:flex;overflow-x:auto;gap:16px;}
.album img{height:260px;border-radius:12px;}

.map img{width:95%;max-width:520px;border-radius:14px;}

.contact{
background:rgba(0,0,0,0.85);
font-size:22px;
}

/* ⭐ Facebook ลอย */
.fb-button{
position:fixed;
bottom:20px;
right:20px;
}
.fb-button img{width:60px;}

html{scroll-behavior:smooth;}

</style>
</head>

<body id="top">

<!-- ⭐ เมนู -->
<div class="menu">
<a href="#top">หน้าแรก</a>
<a href="#history">ประวัติวัด</a>
<a href="#visit">เยี่ยมชมวัด</a>
<a href="#activity">กิจกรรม</a>
<a href="#donate">ทำบุญ</a>
<a href="#contact">ติดต่อ</a>

<div class="lang">
<button onclick="setLang('th')">ไทย</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('zh')">中文</button>
</div>
</div>

<!-- โลโก้ -->
<div class="logo">
<img src="img/logo.png">
</div>

<div class="name">วัดโบสถ์อินทรสารเพชร</div>
<div class="eng">Wat Boad Indharasanphet</div>

<div class="temple">
<img src="img/temple.png">
</div>

<div class="text">
ร่วมทำบุญออนไลน์ เพื่อทำนุบำรุงพระพุทธศาสนา
</div>
<!-- ⭐ เพิ่มใน <style> -->
<style>
.map iframe{
width:95%;
max-width:600px;
height:350px;
border:0;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
margin-top:20px;
}
</style>

<!-- ⭐ เพิ่มปุ่มเมนู (ใส่ใน .menu) -->
<a href="#map">แผนที่</a>

<!-- ⭐ วางก่อน contact -->
<div class="map" id="map">
<h2>แผนที่วัด</h2>

<img src="img/map.png" alt="แผนที่วัด">

<iframe 
src="https://www.google.com/maps?q=https://maps.app.goo.gl/PZxo5fk8nBrXjmMQA&output=embed">
</iframe>

<br><br>

<a href="https://maps.app.goo.gl/PZxo5fk8nBrXjmMQA" target="_blank" class="menu-btn">
📍 เปิดใน Google Maps
</a>

</div>
<!-- ประวัติ -->
<div class="video" id="history">
<h2>ชมวิดีโอประวัติวัด</h2>
<video autoplay muted loop controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<!-- เยี่ยมชม -->
<div class="video" id="visit">
<h2>ชมวิดีโอเยี่ยมชมวัด</h2>
<video autoplay muted controls>
<source src="temple_1.mp4" type="video/mp4">
</video>
</div>
