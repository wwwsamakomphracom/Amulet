<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ร่วมทำบุญ</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:tahoma;background:#f7f7f7;margin:0;text-align:center;}
.section{padding:25px;}
input,textarea{
padding:12px;
width:90%;
max-width:420px;
margin:6px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}
button{
background:#8B0000;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:10px;
}
.video{margin-top:40px;}
.contact{margin-top:40px;padding:20px;background:#f5f5f5;border-radius:10px;}
.list{margin-top:30px;background:white;padding:15px;border-radius:10px;}
</style>
</head>

<body>

<div class="section">

<h2>ขอใบอนุโมทนาบัตร</h2>

<input id="name" placeholder="ชื่อ-นามสกุล"><br>
<textarea id="address" placeholder="ที่อยู่สำหรับจัดส่ง"></textarea><br>
<input id="phone" placeholder="เบอร์โทร"><br>
<input id="amount" placeholder="จำนวนเงิน (บาท)"><br>

<button onclick="donate()">บันทึกข้อมูล + สร้างใบอนุโมทนา</button>

<div id="qrcode"></div>

</div>

<!-- แสดงรายชื่อผู้ทำบุญ -->
<div class="list">
<h3>รายชื่อผู้ร่วมทำบุญ</h3>
<div id="donorList"></div>
</div>

<!-- วิดีโอ -->
<div class="video">
<h2 style="color:#8B0000;">วิดีโอประวัติวัด</h2>
<video controls width="90%" style="max-width:500px;border-radius:12px;">
<source src="video.mp4" type="video/mp4">
</video>
</div>

<!-- ติดต่อ -->
<div class="contact">
<h2 style="color:#8B0000;">ติดต่อวัด</h2>
<p>📞 <a href="tel:0897445457">089-744-5457</a></p>
</div>

<script>

function donate(){

let name=document.getElementById("name").value
let address=document.getElementById("address").value
let phone=document.getElementById("phone").value
let amount=document.getElementById("amount").value

if(!name || !address || !phone || !amount){
alert("กรอกข้อมูลให้ครบ")
return
}

let id="WB"+Math.floor(Math.random()*100000)

// ⭐ บันทึกลง LocalStorage
let donors=JSON.parse(localStorage.getItem("donors")||"[]")

donors.push({
id,name,address,phone,amount,
date:new Date().toLocaleString()
})

localStorage.setItem("donors",JSON.stringify(donors))

showDonors()

// ⭐ QR
let verifyURL=location.origin+"/verify.html?id="+id
let qr=document.getElementById("qrcode")
qr.innerHTML=""
new QRCode(qr,{text:verifyURL,width:150,height:150})

// ⭐ PDF
const { jsPDF } = window.jspdf
let pdf=new jsPDF()

pdf.text("ใบอนุโมทนาบัตร",80,20)
pdf.text("วัดโบสถ์อินทรสารเพชร",60,40)
pdf.text("ผู้ทำบุญ: "+name,20,70)
pdf.text("จำนวนเงิน: "+amount+" บาท",20,90)
pdf.text("เลขที่: "+id,20,110)

pdf.save("receipt.pdf")

alert("บันทึกข้อมูลเรียบร้อย")
}

function showDonors(){
let donors=JSON.parse(localStorage.getItem("donors")||"[]")
let html=""

donors.forEach(d=>{
html+=`<p>⭐ ${d.name} — ${d.amount} บาท (${d.date})</p>`
})

document.getElementById("donorList").innerHTML=html
}

showDonors()

</script>

</body>
</html>
