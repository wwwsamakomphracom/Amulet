<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ร่วมทำบุญกับทางวัด</title>

<style>
body{font-family:tahoma;background:#f7f7f7;margin:0;text-align:center;}

.section{padding:25px;}

.menu-btn{
display:block;
background:#8B0000;
color:white;
padding:16px;
margin:12px auto;
width:92%;
max-width:460px;
border-radius:14px;
text-decoration:none;
font-size:19px;
font-weight:bold;
}

input,textarea,select{
padding:12px;
width:90%;
max-width:420px;
margin:6px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#8B0000;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:10px;
}

.list{
margin:30px auto;
max-width:520px;
background:white;
padding:15px;
border-radius:10px;
text-align:left;
}

</style>
</head>

<body>

<div class="section">

<h2>ร่วมทำบุญกับทางวัด</h2>

<!-- 🪷 รายการทำบุญ -->

<a href="#" class="menu-btn">1️⃣ ทำบุญค่าน้ำค่าไฟ</a>
<a href="https://www.facebook.com/share/1NCvTDkAWU/" class="menu-btn">2️⃣ ทำบุญโลงศพ</a>
<a href="#" class="menu-btn">3️⃣ ทำบุญสร้างอาคารปฏิบัติธรรม</a>
<a href="#" class="menu-btn">4️⃣ ทำบุญทอดกฐิน</a>
<a href="#" class="menu-btn">5️⃣ ทำบุญทอดผ้าป่า</a>
<a href="#" class="menu-btn">6️⃣ ทำบุญถวายสังฆทาน (จองล่วงหน้า)</a>
<a href="#" class="menu-btn">7️⃣ ทำบุญชำระหนี้สงฆ์</a>
<a href="#" class="menu-btn">8️⃣ ทำบุญแก่พระอาพาธ</a>
<a href="#" class="menu-btn">9️⃣ ทำบุญบวชพระ-สามเณร</a>

</div>


<!-- 🧾 ขอใบอนุโมทนาบัตร -->

<div class="section">

<h2>ขอใบอนุโมทนาบัตร</h2>

<input id="name" placeholder="ชื่อ-นามสกุล"><br>
<textarea id="address" placeholder="ที่อยู่สำหรับจัดส่ง"></textarea><br>
<input id="phone" placeholder="เบอร์โทร"><br>

<select id="type">
<option>เลือกประเภทการทำบุญ</option>
<option>ค่าน้ำค่าไฟ</option>
<option>โลงศพ</option>
<option>สร้างอาคารปฏิบัติธรรม</option>
<option>ทอดกฐิน</option>
<option>ทอดผ้าป่า</option>
<option>ถวายสังฆทาน</option>
<option>ชำระหนี้สงฆ์</option>
<option>พระอาพาธ</option>
</select><br>

<input id="amount" placeholder="จำนวนเงิน (บาท)"><br>

<button onclick="saveDonor()">บันทึกข้อมูล</button>

</div>


<!-- ⭐ รายชื่อผู้ทำบุญ -->

<div class="list">
<h3>รายชื่อผู้ร่วมทำบุญ</h3>
<div id="donorList"></div>
</div>


<script>

function saveDonor(){

let name=document.getElementById("name").value
let address=document.getElementById("address").value
let phone=document.getElementById("phone").value
let type=document.getElementById("type").value
let amount=document.getElementById("amount").value

if(!name || !address || !phone || !amount){
alert("กรอกข้อมูลให้ครบ")
return
}

let donors=JSON.parse(localStorage.getItem("donors")||"[]")

donors.push({
name,address,phone,type,amount,
date:new Date().toLocaleString()
})

localStorage.setItem("donors",JSON.stringify(donors))

showDonors()

alert("บันทึกข้อมูลเรียบร้อย")
}

function showDonors(){
let donors=JSON.parse(localStorage.getItem("donors")||"[]")
let html=""

donors.forEach(d=>{
html+=`
<p>
⭐ <b>${d.name}</b><br>
📌 ${d.type} — ${d.amount} บาท<br>
🕒 ${d.date}
</p>
<hr>`
})

document.getElementById("donorList").innerHTML=html
}

showDonors()

</script>

</body>
</html>
