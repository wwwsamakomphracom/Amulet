<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ร่วมทำบุญ</title>
<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="section">

<h2>ร่วมทำบุญ</h2>

<input id="name" placeholder="ชื่อผู้ทำบุญ"><br><br>
<input id="amount" placeholder="จำนวนเงิน"><br><br>

<button onclick="donate()">สร้างใบอนุโมทนา</button>

<div id="qrcode"></div>

</div>

<script>

function donate(){

let name=document.getElementById("name").value
let amount=document.getElementById("amount").value

let id="WB"+Math.floor(Math.random()*100000)

let verifyURL=location.origin+"/verify.html?id="+id

let qr=document.getElementById("qrcode")
qr.innerHTML=""

new QRCode(qr,{
text:verifyURL,
width:150,
height:150
})

const { jsPDF } = window.jspdf
let pdf=new jsPDF()

pdf.text("ใบอนุโมทนาบัตร",80,20)
pdf.text("วัดโบสถ์อินทรสารเพชร",60,40)
pdf.text("ผู้ทำบุญ: "+name,20,70)
pdf.text("จำนวนเงิน: "+amount+" บาท",20,90)
pdf.text("เลขที่: "+id,20,110)

pdf.save("receipt.pdf")

}

</script>

</body>
</html>
