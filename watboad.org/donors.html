<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>รายชื่อผู้ร่วมบุญ</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="section">

<h2>รายชื่อผู้ร่วมบุญ</h2>

<div id="list"></div>

</div>

<script>

let donors=[
{name:"สมชาย",amount:500},
{name:"สมหญิง",amount:1000}
]

let html=""

donors.forEach(d=>{
html+="<p>"+d.name+" ทำบุญ "+d.amount+" บาท</p>"
})

document.getElementById("list").innerHTML=html

</script>

</body>
</html>
