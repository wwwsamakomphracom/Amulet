<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กิจกรรมของวัด</title>

<style>

body{
    margin:0;
    font-family:Tahoma;
    background:#f2f2f2;
}

.header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.post{
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
    margin-bottom:30px;
    overflow:hidden;
}

.post img{
    width:100%;
}

.post-content{
    padding:20px;
}

.post-title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.post-text{
    font-size:16px;
    color:#333;
}

</style>
</head>

<body>

<div class="header">
กิจกรรมของวัด
</div>

<div class="container">

<!-- กิจกรรมที่ 1 -->
<div class="post">
<img src="images/activity1.jpg">

<div class="post-content">
<div class="post-title">
พิธีทำบุญประจำปี
</div>

<div class="post-text">
ทางวัดได้จัดพิธีทำบุญประจำปี มีพุทธศาสนิกชนเข้าร่วมจำนวนมาก
ร่วมถวายภัตตาหารแด่พระสงฆ์และรับพรเพื่อความเป็นสิริมงคล
</div>
</div>
</div>

<!-- กิจกรรมที่ 2 -->
<div class="post">
<img src="images/activity2.jpg">

<div class="post-content">
<div class="post-title">
ทอดกฐินสามัคคี
</div>

<div class="post-text">
ญาติโยมร่วมกันจัดงานทอดกฐินสามัคคีเพื่อสมทบทุนบูรณะเสนาสนะของวัด
บรรยากาศเต็มไปด้วยความศรัทธา
</div>
</div>
</div>

</div>

</body>
</html>
