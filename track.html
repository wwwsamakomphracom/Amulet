<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดตามสถานะสิ่งของ</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.header {
  background: #e60000;
  color: white;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

h1 {
  font-size: 26px;
}

.input-box {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-top: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.btn-search {
  width: 100%;
  background: #e60000;
  color: white;
  border: none;
  padding: 15px;
  font-size: 20px;
  border-radius: 8px;
  margin-top: 15px;
  cursor: pointer;
}

.result-box {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="header">
  ไปรษณีย์ไทย Thailand Post
</div>

<div class="container">

<h1>ติดตามสถานะสิ่งของ</h1>

<p>กรอกหมายเลขสิ่งของ 13 หลัก</p>

<input type="text" id="trackingNumber" class="input-box" placeholder="เช่น TAG123456789TH">

<button class="btn-search" onclick="searchParcel()">ค้นหา</button>

<div class="result-box" id="resultBox">
  <h3>ผลการค้นหา</h3>
  <p id="resultText"></p>
</div>

</div>

<script>
function searchParcel() {

  var number = document.getElementById("trackingNumber").value.trim();
  var resultBox = document.getElementById("resultBox");
  var resultText = document.getElementById("resultText");

  if(number === ""){
    alert("กรุณากรอกเลขพัสดุ");
    return;
  }

  resultBox.style.display = "block";
  resultText.innerHTML = "กำลังค้นหาเลขพัสดุ: " + number;

}
</script>

</body>
</html>
