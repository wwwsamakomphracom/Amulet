<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:0;
  background:#ffffff;
  font-family:Arial;
}

/* ภาพพื้นหลัง */
.bg{
  width:100%;
  position:absolute;
  top:0;
  left:0;
  z-index:1;
}

/* พื้นที่ค้นหา */
.search-area{
  position:relative;
  z-index:2;
  margin-top:320px;
  padding-left:20px;
}

/* ช่องค้นหา */
.search-box{
  width:85%;
  height:90px;
  background:#ffffff;
  border:2px solid rgba(0,0,0,0.3);
  border-radius:40px;
  outline:none;
  font-size:22px;
  padding-left:25px;
}

/* ปุ่มค้นหา */
.search-btn{
  position:absolute;
  left:30px;
  top:110px;
  width:140px;
  height:55px;
  background:red;
  color:#ffffff;
  border:none;
  border-radius:15px;
  font-size:20px;
}

/* ข้อความแจ้งเตือน */
.error{
  position:absolute;
  top:180px;
  left:30px;
  color:red;
  font-size:18px;
}
</style>
</head>

<body>

<img src="img/Gg.png" class="bg">

<div class="search-area">

<input type="text" id="trackInput" class="search-box">

<button class="search-btn" onclick="checkTrack()">ค้นหา</button>

<div id="errorMsg" class="error"></div>

</div>

<script>
function checkTrack(){
  var input = document.getElementById("trackInput").value;

  if(input === "OB754419535TH"){
    window.location.href = "OB754419535TH/index.html";
  }else{
    document.getElementById("errorMsg").innerHTML = "ไม่พบข้อมูล";
  }
}
</script>

</body>
</html>
