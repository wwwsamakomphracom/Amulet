<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  padding:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
}

/* ภาพพื้นหลัง */
.bg{
  width:100%;
  position:absolute;
  top:0;
  left:0;
  z-index:1;
}

/* กล่องครอบทั้งหมด */
.search-area{
  position:relative;
  z-index:2;
  margin-top:320px;
  padding-left:20px;
}

/* ช่องค้นหา */
.search-box{
  width:85%;
  height:90px;
  background:#ffffff;
  border:2px solid rgba(0,0,0,0.3);
  border-radius:40px;
  outline:none;
  font-size:22px;
  padding-left:25px;
}

/* ปุ่มค้นหา */
.search-btn{
  position:absolute;
  left:30px;
  top:110px;
  width:140px;
  height:55px;
  background:red;
  color:#ffffff;
  border:none;
  border-radius:15px;
  font-size:20px;
}

</style>
</head>

<body>

<!-- ภาพพื้นหลัง -->
<img src="img/Gg.png" class="bg">

<!-- ช่องค้นหา -->
<div class="search-area">
<input type="text" class="search-box">
<button class="search-btn">ค้นหา</button>
</div>

</body>
</html>
