<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบพัสดุ</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
  padding-top: 100px;
}

.search-box {
  background: #fff;
  padding: 30px;
  width: 300px;
  margin: auto;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 18px;
  color: red;
}
</style>
</head>

<body>

<div class="search-box">
  <h2>ตรวจสอบเลขพัสดุ</h2>

  <input type="text" id="trackInput" placeholder="กรอกเลขพัสดุ">

  <br>

  <button onclick="checkTrack()">ค้นหา</button>

  <div id="result"></div>
</div>

<script>
function checkTrack() {

  let input = document.getElementById("trackInput").value.trim();
  let correct = "OB754419535TH";

  if(input === correct){
    document.getElementById("result").style.color = "green";
    document.getElementById("result").innerHTML = "พบข้อมูลพัสดุของคุณแล้ว";
  }
  else{
    document.getElementById("result").style.color = "red";
    document.getElementById("result").innerHTML = "ไม่พบข้อมูล";
  }

}
</script>

</body>
</html>
