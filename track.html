<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดตามสถานะสิ่งของ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(135deg,#f5e6b3,#e4c97a,#f5e6b3);
  height: 100vh;
}

.header {
  background: #e60000;
  color: white;
  padding: 15px;
  font-size: 20px;
  text-align: center;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.box {
  background: white;
  border-radius: 15px;
  padding: 25px;
  margin-top: 40px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 18px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 15px;
  background: #e60000;
  border: none;
  color: white;
  font-size: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

button:hover {
  background: #c40000;
}
</style>
</head>

<body>

<div class="header">
ไปรษณีย์ไทย Thailand Post
</div>

<div class="container">
  <div class="box">
    <h2>ติดตามสถานะสิ่งของ</h2>
    <p>กรอกหมายเลขสิ่งของ 13 หลัก</p>

    <input id="track" placeholder="เช่น TAG123456789TH">
    <button onclick="search()">ค้นหา</button>
  </div>
</div>

<script>
function search(){
let code=document.getElementById("track").value;
window.location.href=code;
}
</script>

</body>
</html>
