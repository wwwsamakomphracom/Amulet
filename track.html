<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:0;
background:url("img/Gg.png") no-repeat center center fixed;
background-size:cover;
}

/* กล่องค้นหา */
.search-box{
position:absolute;
bottom:160px;
width:100%;
text-align:center;
}

/* ช่องค้นหา */
input{
width:80%;
height:65px;
background:white;
border:2px solid black;
border-radius:10px;
outline:none;
font-size:22px;
}

/* ปุ่มค้นหา */
button{
margin-top:20px;
width:80%;
height:65px;
background:#e60012;
color:white;
font-size:24px;
border:none;
border-radius:12px;
}

/* ซ่อน placeholder */
::placeholder{
color:transparent;
}

</style>
</head>

<body>

<div class="search-box">

<input type="text" id="track">

<br>

<button onclick="search()">ค้นหา</button>

</div>

<script>

function search(){

var code = document.getElementById("track").value;

if(code == ""){
alert("กรุณากรอกเลขพัสดุ");
return;
}

if(code == "TAG945728551"){
alert("พบข้อมูลพัสดุ");
}
else{
alert("ไม่พบข้อมูล");
}

}

</script>

</body>
</html>
