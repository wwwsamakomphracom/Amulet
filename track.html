<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<style>

  margin:0;

  font-family:Arial, sans-serif;

  margin:auto;
  padding:20px;

.title{
  font-size:28px;

/* ช่องค้นหา (ใหญ่ 2 เท่า) */
input[type="text"]{
  width:100%;
  height:120px;
  font-size:36px;
  border:2px solid #444; /* ดำอ่อนบาง */
  border-radius:25px;

  outline:none;
  margin-top:30px;
}

button{

  margin-top:25px;
  background:#e60000;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:bold;
}
</style>
</head>

<body>
