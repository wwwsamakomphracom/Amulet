<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Parcel</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
}

#track{
width:90%;
height:60px;
font-size:22px;
padding:10px;
border:3px solid black;
border-radius:15px;
background:#fff;
box-sizing:border-box;
outline:none;
}

button{
margin-top:20px;
width:90%;
height:60px;
font-size:22px;
background:red;
color:white;
border:none;
border-radius:15px;
}

</style>
</head>

<body>

<h2>ติดตามสถานะสิ่งของ</h2>

<input type="text" id="track">

<br>

<button onclick="search()">ค้นหา</button>

<script>

function search(){

var code=document.getElementById("track").value;

if(code=="OB7544195356TH"){
window.location.href="OB7544195356TH/";
}

else{
alert("ไม่พบข้อมูล");
}

}

</script>

</body>
</html>
