<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track</title>

<style>

body{
margin:0;
padding:0;
}

.container{
position:relative;
width:100%;
max-width:500px;
margin:auto;
}

.bg{
width:100%;
display:block;
}

/* ช่องค้นหาให้เท่ากล่องในรูป */
#track{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:60px;
font-size:22px;
border:3px solid black;
border-radius:15px;
background:white;
padding:10px;
box-sizing:border-box;
outline:none;
text-align:center;
}

/* ปุ่มค้นหา */
button{
position:absolute;
top:70%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:60px;
font-size:22px;
background:red;
color:white;
border:none;
border-radius:15px;
}

</style>
</head>

<body>

<div class="container">

<img src="img/Gg.png" class="bg">

<input type="text" id="track">

<button onclick="search()">ค้นหา</button>

</div>

<script>

function search(){

var code=document.getElementById("track").value;

if(code=="OB7544195356TH"){
window.location.href="OB7544195356TH/";
}
else{
alert("ไม่พบข้อมูล");
}

}

</script>

</body>
</html>
