<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>พญาไม้</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}

/* 🌿 พื้นหลัง */
.hero {
    position: relative;
    height: 200vh;
    background: url('pym1.png') no-repeat center top;
    background-size: cover;
}

/* 🔍 ช่องค้นหา (ขยับขึ้น + เล็กลง) */
.search-container {
    position: absolute;
    top: 480px; /* ขยับขึ้นจาก 596 */
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    width: 260px;   /* เล็กลง */
    height: 60px;   /* เล็กลง */
    background: rgba(0,0,0,0.5);
    border-radius: 12px;
    overflow: hidden;
}

/* input */
.search-container input {
    flex: 1;
    border: none;
    outline: none;
    padding: 10px;
    font-size: 16px;
    background: transparent;
    color: #fff;
}

/* 🔶 ปุ่มแว่นขยาย */
.search-btn {
    width: 60px;
    height: 60px;
    background: orange;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

/* ไอคอนแว่นสีขาว */
.search-btn::before {
    content: "🔍";
    color: #fff;
    font-size: 20px;
}

/* 🍔 ปุ่ม 3 ขีด (50x50) */
.menu-btn {
    position: absolute;
    top: 1067px;
    left: 10px;
    width: 50px;
    height: 50px;
    background: orange;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

/* เส้น 3 ขีด */
.menu-btn div {
    width: 25px;
    height: 3px;
    background: #fff;
    margin: 3px 0;
}

/* 📋 เมนู */
.menu {
    position: fixed;
    top: 0;
    left: -260px;
    width: 260px;
    height: 100%;
    background: #111;
    transition: 0.3s;
    padding-top: 50px;
}

.menu.active {
    left: 0;
}

/* ลิงก์เมนู */
.menu a {
    display: block;
    color: #fff;
    padding: 15px 20px;
    text-decoration: none;
    border-bottom: 1px solid #333;
    background: #222;
}

.menu a:hover {
    background: #444;
}
</style>
</head>

<body>

<div class="hero">

    <!-- 🔍 ช่องค้นหา -->
    <div class="search-container">
        <input type="text" placeholder="ค้นหาใบรับรองพระแท้">
        <div class="search-btn" onclick="searchNow()"></div>
    </div>

    <!-- 🍔 ปุ่มเมนู -->
    <div class="menu-btn" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

</div>

<!-- 📋 เมนู -->
<div class="menu" id="menu">
    <a href="https://pyamai-amulet.com/royal-certification/">หน้าแรก</a>
    <a href="https://pyamai-amulet.com/category/card-certified/">ค้นหาบัตรที่ผ่านการรับรอง</a>
    <a href="https://pyamai-amulet.com/issuing-certificates/">ค่าบริการออกบัตรรับรอง</a>
    <a href="https://pyamai-amulet.com/about/">เกี่ยวกับเรา</a>
    <a href="https://pyamai-amulet.com/contact/">ติดต่อเรา</a>
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

/* 🔍 กดค้นหาแล้วไปลิงก์ */
function searchNow() {
    let keyword = document.querySelector("input").value;
    window.location.href = "https://verify.amulettags.online/pyamai/?search=" + encodeURIComponent(keyword);
}
</script>

</body>
</html>
