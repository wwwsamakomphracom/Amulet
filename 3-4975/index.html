<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakhon Amulet - ใบรับรอง 3-4975</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Tahoma, sans-serif;
      color: #fff;
      background: #000;
      text-align: center;
    }

    /* Navbar */
    .navbar {
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 12px 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    .navbar a:hover {
      color: gold;
    }

    /* Header */
    .header {
      margin-top: 60px;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }

    .header h1 {
      color: gold;
      font-size: 22px;
    }

    .header p {
      margin-top: 5px;
      font-size: 14px;
    }

    /* รูปใบรับรอง */
    .certificate {
      max-width: 100%;
      height: auto;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .certificate:hover {
      transform: scale(1.02);
    }

    /* ⭐⭐⭐ Lightbox (เพิ่มใหม่) */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      padding-top: 40px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
    }

    .lightbox img {
      margin: auto;
      display: block;
      max-width: 95%;
      max-height: 90%;
      border-radius: 10px;
      box-shadow: 0 0 30px rgba(255,255,255,0.2);
    }

    .close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    /* รองรับการเลื่อน */
    .wrapper {
      min-height: 120vh;
    }
  </style>
</head>

<body>

  <!-- เมนู -->
  <div class="navbar">
    <a href="#">หน้าแรก</a>
    <a href="#">ค้นหาใบรับรอง</a>
    <a href="#">ติดต่อ</a>
  </div>

  <div class="wrapper">

    <!-- หัวข้อ -->
    <div class="header">
      <h1>ใบรับรองพระแท้</h1>
      <p>รหัสใบรับรอง: 3-4975</p>
    </div>

    <!-- ⭐ รูปใบรับรองหลัก -->
    <img src="./3-4975.png" alt="ใบรับรอง 3-4975" class="certificate" onclick="openLightbox()">

  </div>

  <!-- ⭐⭐⭐ Lightbox -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <span class="close">&times;</span>

    <!-- ⭐ ใช้ไฟล์ใหม่ที่คุณเพิ่ม -->
    <img src="./3-4975-.png" id="lightbox-img">
  </div>

  <!-- ⭐⭐⭐ Script -->
  <script>
    function openLightbox(){
      document.getElementById("lightbox").style.display = "block";
    }

    function closeLightbox(){
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>
