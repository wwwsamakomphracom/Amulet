<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ตรวจสอบใบรับรองพระเครื่อง | TAG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: "Tahoma", sans-serif;
        background: #6c6c6c;
        color: #000;
    }
    .container {
        max-width: 420px;
        margin: auto;
        padding: 20px;
    }
    .card {
        background: #777;
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
    }
    .card p {
        font-size: 16px;
        line-height: 1.6;
    }
    .image-box {
        height: 220px;
        border: 3px dashed #3b82c4;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #3b82c4;
        font-size: 20px;
        margin-bottom: 20px;
    }
    label {
        font-weight: bold;
        font-size: 18px;
        display: block;
        margin-bottom: 8px;
    }
    input {
        width: 100%;
        padding: 14px;
        font-size: 18px;
        border-radius: 25px;
        border: 3px solid #d4a84f;
        outline: none;
        box-sizing: border-box;
        text-align: center;
    }
    button {
        width: 100%;
        margin-top: 16px;
        padding: 14px;
        font-size: 20px;
        border-radius: 25px;
        border: none;
        background: #2f6fa7;
        color: #fff;
        cursor: pointer;
    }
    button:hover {
        background: #245a88;
    }
</style>
</head>

<body>
<div class="container">

    <div class="card">
        <p>
            พระเครื่อง วัตถุมงคล ชิ้นนี้ ได้รับการตรวจสอบจากสถาบัน TAG
            ขอรับรองว่าเป็นพระแท้ตามมาตรฐานสากล
            พร้อมรับซื้อวัตถุมงคลชิ้นนี้ในราคาที่ทางสถาบันประเมินไว้
        </p>
    </div>

    <div class="image-box">
        ไม่พบข้อมูลบัตร
    </div>

    <div class="card">
        <label>เลขบัตร</label>
        <input id="tagInput" type="text" placeholder="กรอกเลข TAG เช่น TAG836628463">
        <button onclick="goVerify()">ค้นหา</button>
    </div>

</div>

<script>
function goVerify() {
    let code = document.getElementById("tagInput").value.trim().toUpperCase();
    if (!code.startsWith("TAG")) {
        alert("กรุณากรอกเลข TAG ให้ถูกต้อง");
        return;
    }
    window.location.href = "/" + code + "/";
}
</script>

</body>
</html>
