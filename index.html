<!DOCTYPE html>

<head>

<title>TAG Amulet Verification</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#fff;
    text-align:center;
}

/* ===== HEADER ===== */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 20px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:2px;
}

.menu{
    display:flex;
    gap:30px;
    font-size:14px;
}

.menu a{
    text-decoration:none;
    color:#000;
}

.flags img{
    width:26px;
    margin-left:8px;
}

/* ===== BODY ===== */
.container{
    max-width:420px;
    margin:30px auto;
    padding:0 15px;
}

.title{
    font-size:26px;
    color:#9a9a9a;
    font-weight:bold;
    -webkit-text-stroke:1px #000;
    margin-bottom:20px;
}

/* Card box */
.card{
    border:2px dashed #999;
    border-radius:10px;
    height:220px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
    font-size:18px;
    color:#555;
}

.card.blue{
    border-color:#1e90ff;
}

/* Text */
.verify-text{
    font-size:14px;
    color:#000;
    line-height:1.6;
    margin:20px 0;
}

/* Input */
.label{
    text-align:left;
    font-size:14px;
    margin-top:20px;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    outline:none;
    background:#fff;
}

/* Button */
button{
    margin-top:15px;
    padding:12px;
    width:100%;
    font-size:18px;
    color:#1e90ff;
    background:#eaf3ff;
    border:2px solid #1e90ff;
    border-radius:6px;
    cursor:pointer;
}

/* Footer logo */
.footer-logo{
    margin:40px 0 10px;
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
}
</style>
</head>

<body>

</html>
