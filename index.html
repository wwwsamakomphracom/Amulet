<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TAG Amulet Verification</title>

  <style>
    body {
      margin: 0;
      font-family: "Prompt", sans-serif;
      background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
      color: #e0e0e0;
    }

    .verify-box {
      border: 2px dashed #4fc3f7;
      border-radius: 12px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px 0;
      color: #81d4fa;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
      text-align: center;
      outline: none;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      border: none;
      background: #4fc3f7;
      color: #003c5f;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #29b6f6;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      opacity: 0.7;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>ระบบตรวจสอบใบรับรอง TAG</h1>
      <p class="desc">
        พระเครื่อง / วัตถุมงคลชิ้นนี้  
        ได้รับการตรวจสอบจากสถาบัน TAG  
        รับรองความแท้ตามมาตรฐานสากล
      </p>
    </div>

    <div class="card">
      <div class="verify-box">
        ไม่พบข้อมูลบัตร
      </div>

      <input
        type="text"
        id="tagInput"
        placeholder="กรอกเลข TAG เช่น TAG836628463"
      />

      <button onclick="verifyTag()">ตรวจสอบ</button>
    </div>

    <div class="footer">
      © TAG Amulet Certification System
    </div>

  </div>

  <script>
    function verifyTag() {
      const tag = document.getElementById("tagInput").value.trim().toUpperCase();

      const routes = {
        "TAG836628463": "https://wirakan90-ai.github.io/tag-verification/TAG836628463/",
        "TAG725538266": "https://wirakan90-ai.github.io/tag-verification/TAG725538266/",
        "TAG736628325": "https://wirakan90-ai.github.io/tag-verification/TAG736628325/"
      };

      if (routes[tag]) {
        window.location.href = routes[tag];
      } else {
        alert("ไม่พบข้อมูลบัตรใบรับรองนี้");
      }
    }
  </script>

</body>
</html>
