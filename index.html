<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>TAG | ตรวจสอบใบรับรอง</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family: Tahoma, Arial, sans-serif;
    background:#5f5f5f;
    color:#fff;
}

/* ===== HEADER ===== */
header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px;
    background:#555;
}

.logo{
    font-size:34px;
    font-weight:bold;
    letter-spacing:2px;
    color:#c9a24d;
    text-shadow:2px 2px 4px rgba(0,0,0,.6);
}

.menu{
    font-size:22px;
}

/* ===== TITLE ===== */
.title{
    text-align:center;
    margin:30px 0 10px;
    font-size:38px;
    letter-spacing:6px;
    color:#dcdcdc;
    text-shadow:3px 3px 6px rgba(0,0,0,.6);
}

/* ===== VERIFY BOX ===== */
.box{
    margin:20px;
    padding:40px 20px;
    border:3px dashed #2aa1ff;
    border-radius:14px;
    text-align:center;
    color:#ffffff;
    font-size:20px;
}

/* ===== SEARCH INPUT ===== */
.search{
    margin:20px;
}

.search input{
    width:100%;
    padding:14px;
    font-size:18px;
    background:transparent;
    border:2px solid #2aa1ff;
    border-radius:10px;
    color:#ffffff;
    outline:none;
}

.search input::placeholder{
    color:rgba(255,255,255,0.6);
}

/* ===== INFO TEXT ===== */
.info{
    margin:20px;
    font-size:16px;
    line-height:1.6;
    color:#f0f0f0;
}

/* ===== FOOTER BOX ===== */
.box.small{
    padding:30px 20px;
    font-size:20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">TAG</div>
    <div class="menu">☰</div>
</header>

<div class="title">SILVER CARD</div>

<!-- กล่องบน -->
<div class="box">
    ไม่พบข้อมูลบัตร
</div>

<!-- ช่องกรอกเลขบัตร -->
<div class="search">
    <input type="text" placeholder="กรอกเลขบัตรเพื่อตรวจสอบ">
</div>

<div class="info">
    พระเครื่อง วัตถุมงคล ชิ้นนี้ ได้รับการตรวจสอบจากสถาบัน TAG
    ขอรับรองว่าเป็นพระแท้ตามมาตรฐานสากล
    พร้อมรับซื้อวัตถุมงคลชิ้นนี้ในราคาที่ทางสถาบันประเมินไว้
</div>

<!-- กล่องล่าง -->
<div class="box small">
    ไม่พบข้อมูลบัตร
</div>

</body>
</html>
