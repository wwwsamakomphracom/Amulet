  border-radius:16px;

  background:#fff;
  font-size:20px;
  color:#000;

}
input::placeholder{
  color:#bfbfbf;
}

/* TEXT */
.desc{
  margin:0 22px 26px;
  font-size:18px;
  line-height:1.6;
  color:#eaeaea;
}

/* BUTTON */
.btn-wrap{
  text-align:center;
  margin-bottom:28px;
}
button{
  padding:10px 36px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#2b5f94;
  color:#fff;
}

/* FOOTER */
footer{
  background:#2f2f2f;
  text-align:center;
  padding:18px 10px;
  font-size:14px;
  color:#c9a24d;
