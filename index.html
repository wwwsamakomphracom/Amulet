<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ค้นหาบัตรรับรอง | TAG Amulet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #1e3c4f;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #fff;
      font-size: 22px;
      font-weight: bold;
    }

    nav a {
      color: #fff;
      margin-left: 15px;
      text-decoration: none;
      font-size: 15px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 50px 20px;
      text-align: center;
    }

    h1 {
      color: #333;
    }

    input {
      width: 220px;
      padding: 10px;
      font-size: 15px;
    }

    button {
      padding: 10px 18px;
      margin-left: 5px;
      font-size: 15px;
      background: #1e3c4f;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #163040;
    }

    #result {
      margin-top: 25px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">TAG AMULET</div>
  <nav>
    <a href="https://tag-amulet.com/">หน้าแรก</a>
    <a href="#search">ค้นหาบัตรรับรอง</a>
    <a href="https://tag-amulet.com/certificate-process/">ออกใบรับรอง</a>
    <a href="https://tag-amulet.com/%E0%B8%9B%E0%B8%A3%E0%B8%B0%E0%B9%80%E0%B8%A0%E0%B8%97%E0%B8%9A%E0%B8%B1%E0%B8%95%E0%B8%A3%E0%B8%A3%E0%B8%B1%E0%B8%9A%E0%B8%A3%E0%B8%AD%E0%B8%87/">ประเภทใบรับรอง</a>
    <a href="https://tag-amulet.com/about-us/">เกี่ยวกับเรา</a>
  </nav>
</header>

<main id="search">
  <h1>ค้นหาบัตรรับรอง</h1>

  <input id="codeInput" placeholder="กรอกรหัสบัตรรับรอง">
  <button onclick="searchCode()">ค้นหา</button>

  <div id="result"></div>
</main>

<script>
  function searchCode() {
    const code = document.getElementById("codeInput").value.trim();
    const result = document.getElementById("result");

    if (!code) {
      result.innerHTML = "❌ กรุณากรอกรหัสบัตร";
      return;
    }

    result.innerHTML = `
      ✅ พบข้อมูลบัตรรับรอง<br>
      รหัส: <b>${code}</b><br>
      สถานะ: ผ่านการรับรอง
    `;
  }
</script>

</body>
</html>
