<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ผลการค้นหา</title>

<style>

body{
font-family:tahoma;
text-align:center;
padding:40px;
background:#f5f5f5;
}

.card{
margin-top:30px;
}

</style>

</head>

<body>

<h2>ผลการค้นหาเลขบัตร</h2>

<div id="result"></div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id=="SPT1234567"){
document.getElementById("result").innerHTML =
"<div class='card'><h3>พบข้อมูลใบรับรอง</h3><img src='card.jpg' width='350'></div>";
}
else{
document.getElementById("result").innerHTML="<h3>ไม่พบข้อมูล</h3>";
}

</script>

</body>
</html>
