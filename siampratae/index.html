<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สยามพระแท้</title>

<style>

body{
margin:0;
font-family:tahoma;
}

/* ภาพพื้นหลัง */

.container{
position:relative;
max-width:900px;
margin:auto;
}

.container img{
width:100%;
display:block;
}

/* ปุ่มใส */

.btn{
position:absolute;
display:block;
}

/* ตำแหน่งปุ่ม (ปรับได้ทีหลัง) */

.home{
top:160px;
left:35%;
width:30%;
height:40px;
}

.searchmenu{
top:210px;
left:35%;
width:30%;
height:40px;
}

.issue{
top:260px;
left:35%;
width:30%;
height:40px;
}

.contact{
top:310px;
left:35%;
width:30%;
height:40px;
}

/* ช่องค้นหา */

.searchbox{
position:absolute;
bottom:120px;
left:10%;
width:80%;
}

.searchbox input{
width:100%;
padding:18px;
font-size:22px;
border-radius:10px;
border:2px solid #ccc;
}

.searchbox button{
margin-top:10px;
padding:14px 40px;
font-size:20px;
background:#a40000;
color:white;
border:none;
border-radius:8px;
}

</style>

<script>

function searchCard(){

var id=document.getElementById("card").value;

if(id==""){
alert("กรุณากรอกเลขบัตร");
return;
}

window.location.href="result.html?id="+id;

}

</script>

</head>

<body>

<div class="container">

<img src="home.png">

<a class="btn home" href="index.html"></a>

<a class="btn searchmenu" href="#search"></a>

<a class="btn issue" href="#"></a>

<a class="btn contact" href="#"></a>

<div class="searchbox" id="search">

<input type="text" id="card" placeholder="กรอกเลข เช่น SPT1234567">

<br>

<button onclick="searchCard()">ค้นหา</button>

</div>

</div>

</body>
</html>
