<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สยามพระแท้</title>

<style>

body{
margin:0;
font-family:Tahoma;
text-align:center;
background:#f5f5f5;
}

/* รูปหน้าเว็บ */
.hero{
background:url('home.jpg') no-repeat center;
background-size:cover;
height:900px;
position:relative;
}

/* เมนู */
.menu{
position:absolute;
top:180px;
left:50%;
transform:translateX(-50%);
}

.menu a{
display:block;
font-size:28px;
margin:10px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* ช่องค้นหา */

.search-box{
position:absolute;
bottom:150px;
left:50%;
transform:translateX(-50%);
width:70%;
}

.search-box input{
width:100%;
padding:18px;
font-size:22px;
border-radius:10px;
border:2px solid #999;
}

.search-box button{
margin-top:10px;
padding:12px 30px;
font-size:20px;
border:none;
background:#8b0000;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

<script>

function searchCard(){

var id=document.getElementById("card").value;

if(id==""){
alert("กรุณากรอกเลขบัตร");
return;
}

/* ลิงค์หน้าผลลัพธ์ */

window.location.href="result.html?id="+id;

}

</script>

</head>

<body>

<div class="hero">

<div class="menu">

<a href="index.html">หน้าหลัก</a>

<a href="#search">ค้นหาใบรับรอง</a>

<a href="issue.html">ออกใบรับรอง</a>

<a href="contact.html">ติดต่อเรา</a>

</div>

<div class="search-box" id="search">

<input type="text" id="card" placeholder="กรอกเลขบัตรรับรอง">

<br>

<button onclick="searchCard()">ค้นหา</button>

</div>

</div>

</body>
</html>
