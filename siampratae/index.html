<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สยามพระแท้</title>

<style>

body{
margin:0;
font-family:tahoma;
text-align:center;
}

/* พื้นหลัง */

.bg{
background-image:url("home.png");
background-size:cover;
background-position:center;
height:100vh;
}

/* เมนู */

.menu{
padding-top:140px;
}

.menu a{
display:block;
font-size:28px;
margin:15px;
color:black;
text-decoration:none;
font-weight:bold;
}

/* ช่องค้นหา */

.search{
margin-top:250px;
}

.search input{
width:80%;
max-width:500px;
padding:15px;
font-size:20px;
border-radius:10px;
border:1px solid #888;
}

.search button{
margin-top:10px;
padding:12px 40px;
font-size:18px;
background:#8b0000;
color:white;
border:none;
border-radius:8px;
}

</style>

<script>

function searchCard(){

var id=document.getElementById("card").value;

if(id==""){
alert("กรุณากรอกเลขบัตร");
return;
}

window.location.href="result.html?id="+id;

}

</script>

</head>

<body>

<div class="bg">

<div class="menu">

<a href="index.html">หน้าหลัก</a>

<a href="#search">ค้นหาบัตร</a>

<a href="#">ออกบัตรรับรอง</a>

<a href="#">ติดต่อเรา</a>

</div>

<div class="search" id="search">

<h2>ค้นหาเลขบัตร</h2>

<input
type="text"
id="card"
placeholder="กรอกเลข เช่น SPT1234567">

<br>

<button onclick="searchCard()">ค้นหา</button>

</div>

</div>

</body>
</html>
