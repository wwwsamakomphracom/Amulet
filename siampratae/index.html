<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สยามพระแท้</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

/* ภาพพื้นหลัง */

.container{
position:relative;
max-width:900px;
margin:auto;
}

.container img{
width:100%;
display:block;
}

/* ปุ่ม Hamburger (3 ขีด) */

.menu-button{

position:absolute;

top:110px;      /* ตำแหน่งเลข 1 */
left:50%;
transform:translateX(-50%);

width:40px;
height:30px;

cursor:pointer;

display:flex;
flex-direction:column;
justify-content:space-between;

z-index:1000;

}

/* เส้น 3 ขีด */

.menu-button span{

display:block;
height:4px;
background:white;
border-radius:3px;

}

/* เมนูที่เปิด */

.menu{

position:absolute;

top:180px;
left:50%;

transform:translateX(-50%);

width:260px;

background:white;

border-radius:10px;

box-shadow:0 5px 20px rgba(0,0,0,0.3);

display:none;

overflow:hidden;

z-index:999;

}

/* รายการเมนู */

.menu a{

display:block;

padding:18px;

font-size:18px;

text-align:center;

text-decoration:none;

color:#333;

border-bottom:1px solid #eee;

}

.menu a:last-child{
border-bottom:none;
}

.menu a:hover{
background:#f3f3f3;
}

</style>

<script>

function toggleMenu(){

var menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}

</script>

</head>

<body>

<div class="container">

<img src="home.png">

<!-- ปุ่ม 3 ขีด -->

<div class="menu-button" onclick="toggleMenu()">

<span></span>
<span></span>
<span></span>

</div>

<!-- เมนู -->

<div class="menu" id="menu">

<a href="#">หน้าหลัก</a>

<a href="#">ค้นหาใบรับรอง</a>

<a href="#">ออกบัตรรับรอง</a>

<a href="#">ติดต่อเรา</a>

</div>

</div>

</body>
</html>
