<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สยามพระแท้</title>

<style>

body{
margin:0;
font-family:tahoma;
text-align:center;
}

/* พื้นหลังเว็บ */

.hero{
background-image:url("home.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
position:relative;
}

/* เมนู */

.menu{
position:absolute;
top:160px;
left:50%;
transform:translateX(-50%);
}

.menu a{
display:block;
font-size:30px;
margin:15px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* ช่องค้นหา */

.search-box{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:500px;
}

.search-box input{
width:100%;
padding:18px;
font-size:22px;
border-radius:12px;
border:2px solid #999;
}

.search-box button{
margin-top:10px;
padding:14px 40px;
font-size:20px;
border:none;
background:#8b0000;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

<script>

function searchCard(){

var id=document.getElementById("card").value;

if(id==""){
alert("กรุณากรอกเลขบัตร");
return;
}

/* ไปหน้าผลลัพธ์ */

window.location.href="result.html?id="+id;

}

</script>

</head>

<body>

<div class="hero">

<div class="menu">

<a href="index.html">หน้าหลัก</a>

<a href="#search">ค้นหาบัตร</a>

<a href="issue.html">ออกบัตร</a>

<a href="contact.html">ติดต่อเรา</a>

</div>


<div class="search-box" id="search">

<input
type="text"
id="card"
placeholder="กรอกเลขบัตร เช่น SPT1234567">

<br>

<button onclick="searchCard()">ค้นหา</button>

</div>

</div>

</body>
</html>
