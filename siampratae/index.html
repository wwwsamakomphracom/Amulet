<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สยามพระแท้</title>

<style>

body{
margin:0;
}

/* ภาพพื้นหลัง */

.container{
position:relative;
max-width:900px;
margin:auto;
}

.container img{
width:100%;
display:block;
}

/* ปุ่มโฮมตรงเลข 1 */

.homebtn{
position:absolute;
top:110px;
left:45%;
width:90px;
height:70px;
cursor:pointer;
}

/* เมนู */

.menu{
display:none;
position:absolute;
top:180px;
left:30%;
width:40%;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
text-align:center;
}

.menu a{
display:block;
padding:16px;
font-size:18px;
text-decoration:none;
color:black;
border-bottom:1px solid #ddd;
}

.menu a:hover{
background:#f0f0f0;
}

</style>

<script>

function toggleMenu(){

var menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}

</script>

</head>

<body>

<div class="container">

<img src="home.png">

<div class="homebtn" onclick="toggleMenu()"></div>

<div class="menu" id="menu">

<a href="#">หน้าหลัก</a>
<a href="#">ค้นหาใบรับรอง</a>
<a href="#">ออกบัตรรับรอง</a>
<a href="#">ติดต่อเรา</a>

</div>

</div>

</body>
</html>
