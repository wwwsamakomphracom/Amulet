<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรอง</title>

<style>

body{
margin:0;
padding:0;
background-image:url("search-bg.png");
background-size:cover;
background-position:center;
height:100vh;
font-family:Arial, sans-serif;
}

/* ปุ่มเมนู */
.menu-btn{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:32px;
background:none;
border:none;
cursor:pointer;
}

/* ช่องค้นหา */
.search-box{
position:absolute;
bottom:70px;
left:10px;
}

/* ช่องกรอกเลข */
.search-box input{

width:260px;
height:50px;
font-size:20px;
padding-left:10px;
border-radius:6px;
border:1px solid #ccc;
background:white;

}

/* ปุ่มค้นหา */

.search-box button{

height:52px;
font-size:20px;
margin-left:5px;
cursor:pointer;
color:red;
font-weight:bold;

}

</style>
</head>

<body>


<!-- ปุ่มเมนู -->

<button class="menu-btn">☰</button>



<!-- ช่องค้นหา -->

<div class="search-box">

<input type="text" id="certNumber" placeholder="กรอกเลขใบรับรอง">

<button onclick="searchCert()">ค้นหา</button>

</div>



<script>

function searchCert(){

var number=document.getElementById("certNumber").value;

if(number==="SPT0000001"){

window.location.href="https://verify.amulettags.online/siampratae/certificate-SPT0000001.html";

}else{

alert("ไม่พบข้อมูล");

}

}

</script>


</body>
</html>
