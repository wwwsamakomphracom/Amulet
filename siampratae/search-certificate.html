<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรอง</title>

<style>

body{
margin:0;
padding:0;
background-image:url("search-bg.png");
background-size:cover;
background-position:center;
height:100vh;
font-family:Arial, sans-serif;
}

/* ปุ่มเมนู */
.menu-btn{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:32px;
background:none;
border:none;
cursor:pointer;
z-index:10;
}

/* เมนู */
.menu{
display:none;
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
padding:10px;
text-align:center;
}

.menu a{
display:block;
padding:10px;
text-decoration:none;
color:black;
font-size:18px;
}

/* ช่องค้นหา */
.search-box{
position:absolute;
bottom:40px;
left:10px;
}

/* input */
.search-box input{
width:220px;
height:40px;
font-size:18px;
padding-left:10px;
}

/* ปุ่มค้นหา */
.search-box button{
height:42px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ปุ่มเมนู -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- เมนู -->
<div class="menu" id="menu">

<a href="index.html">หน้าหลัก</a>

<a href="search-certificate.html">ค้นหาใบรับรอง</a>

<a href="issue-certificate.html">ออกใบรับรอง</a>

<a href="contact.html">ติดต่อเรา</a>

</div>


<!-- ช่องค้นหา -->
<div class="search-box">

<input type="text" id="certNumber" placeholder="กรอกเลขใบรับรอง">

<button onclick="searchCert()">ค้นหา</button>

</div>


<script>

/* เปิดเมนู */
function toggleMenu(){

var menu=document.getElementById("menu");

if(menu.style.display==="block"){
menu.style.display="none";
}else{
menu.style.display="block";
}

}


/* ค้นหา */
function searchCert(){

var number=document.getElementById("certNumber").value;

if(number==="SPT0000001"){

window.location.href="result.html";

}else{

alert("ไม่พบข้อมูล");

}

}

</script>

</body>
</html>
