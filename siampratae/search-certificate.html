<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรอง</title>

<style>

body{
margin:0;
padding:0;
background-image:url("search-bg.png");
background-size:cover;
background-position:center;
height:100vh;
font-family:sans-serif;
}

/* ปุ่มเมนู 3 ขีด */
.menu-btn{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:30px;
background:none;
border:none;
cursor:pointer;
}

/* กล่องค้นหา */
.search-box{
position:absolute;
bottom:120px;
left:20px;
}

/* ช่องกรอก */
.search-box input{
width:220px;
height:40px;
font-size:18px;
padding-left:10px;
}

/* ปุ่มค้นหา */
.search-box button{
height:42px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- ปุ่มเมนู -->
<button class="menu-btn" onclick="goHome()">☰</button>

<!-- ช่องค้นหา -->
<div class="search-box">

<input type="text" id="certNumber" placeholder="กรอกเลขใบรับรอง">

<button onclick="searchCert()">ค้นหา</button>

</div>

<script>

function goHome(){
window.location.href="index.html";
}

function searchCert(){

var number=document.getElementById("certNumber").value;

if(number==""){
alert("กรุณากรอกเลขใบรับรอง");
return;
}

window.location.href="result.html?code="+number;

}

</script>

</body>
</html>
