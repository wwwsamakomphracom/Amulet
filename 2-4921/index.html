<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#000;
}

/* กล่องหลัก */
.container{
  position:relative;
  width:800px;
}

/* รูปพื้นหลัง */
.bg{
  width:100%;
  display:block;
}

/* รูปวงกลมสีน้ำเงิน (รูปที่กดขยายได้) */
.photo{
  position:absolute;
  top:180px;   /* ปรับตรงนี้ */
  left:120px;  /* ปรับตรงนี้ */
  width:200px;
  cursor:pointer;
  z-index:2;
}

/* ปุ่มดูรูปเต็ม */
.btn{
  position:absolute;
  top:450px;  /* ปรับตามตำแหน่งวงแดง */
  left:300px;
  padding:10px 20px;
  background:orange;
  color:#fff;
  border:none;
  cursor:pointer;
  z-index:3;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup img{
  max-width:90%;
}

</style>
</head>

<body>

<div class="container">

  <!-- พื้นหลัง -->
  <img src="certificate1.png" class="bg">

  <!-- รูปที่นายจะใส่ -->
  <img src="amulet.png" class="photo" onclick="openImg(this.src)">

  <!-- ปุ่ม -->
  <button class="btn" onclick="openImg('amulet.png')">
    ดูบัตรรับรองขนาดเต็ม
  </button>

</div>

<div class="popup" id="popup" onclick="closeImg()">
  <img id="popupImg">
</div>

<script>
function openImg(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popupImg").src=src;
}

function closeImg(){
  document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
