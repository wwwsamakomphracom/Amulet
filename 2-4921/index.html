<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nakhon Amulet - 2-4921</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Tahoma,sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

/* Navbar */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.8);
  padding:10px;
  z-index:10;
}

/* Header */
.header{
  margin-top:60px;
  padding:20px;
}

/* รูปบัตร */
.certificate{
  width:100%;
  max-width:600px;
  display:block;
  margin:auto;
}

/* 🔥 กล่อง section แบบมืออาชีพ */
.section-box{
  width:90%;
  max-width:600px;
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  background:linear-gradient(145deg, rgba(255,165,0,0.2), rgba(0,0,0,0.6));
  box-shadow:0 0 20px rgba(255,165,0,0.3);
}

/* 🔥 ช่องรูปพระ */
.amulet-box{
  width:110px;
  margin:auto;
  border-radius:12px;
  overflow:hidden;
  border:2px solid gold;
  cursor:pointer;
  background:#111;
  transition:0.3s;
}

.amulet-box:hover{
  transform:scale(1.05);
}

.amulet-box img{
  width:100%;
  height:100px;
  object-fit:contain;
}

.amulet-box span{
  display:block;
  padding:5px;
  font-weight:bold;
}

/* 🔥 ปุ่มดูบัตร */
.full-btn{
  width:90%;
  max-width:500px;
  margin:20px auto;
  padding:15px;
  border:none;
  border-radius:30px;
  background:linear-gradient(to right, gold, orange);
  color:#000;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.full-btn:hover{
  transform:scale(1.03);
}

/* 🔥 popup */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup img{
  max-width:90%;
  max-height:90%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">พระเครื่องพระนคร</div>

<div class="header">
  <h2>ใบรับรองพระแท้</h2>
  <p>รหัส 2-4921</p>
</div>

<!-- รูปบัตร -->
<img src="./2-4921.png" class="certificate">

<!-- 🔵 SECTION รูปพระ -->
<div class="section-box">
  <p>รูปภาพประกอบเพิ่มเติมของพระเครื่อง (1 รูป)</p>

  <div class="amulet-box" onclick="openAmulet()">
    <img src="./2-4921b.png">
    <span>2-4921</span>
  </div>
</div>

<!-- 🔴 ปุ่มดูบัตร -->
<button class="full-btn" onclick="openCert()">
  ดูบัตรรับรองขนาดเต็ม
</button>

<!-- 🔥 popup รูปพระ -->
<div class="popup" id="amuletPopup">
  <span class="close" onclick="closeAll()">✖</span>
  <img src="./2-4921b.png">
</div>

<!-- 🔥 popup รูปบัตร -->
<div class="popup" id="certPopup">
  <span class="close" onclick="closeAll()">✖</span>
  <img src="./2-4921.png">
</div>

<script>
function openAmulet(){
  document.getElementById("amuletPopup").style.display="flex";
}

function openCert(){
  document.getElementById("certPopup").style.display="flex";
}

function closeAll(){
  document.getElementById("amuletPopup").style.display="none";
  document.getElementById("certPopup").style.display="none";
}
</script>

</body>
</html>
