<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakhon Amulet - ใบรับรอง 2-4921</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Tahoma, sans-serif;
      color: #fff;
      background: #000;
      text-align: center;
    }

    .navbar {
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 12px 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .navbar a {
      color: #fff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    .header {
      margin-top: 60px;
      padding: 20px;
      background: rgba(0,0,0,0.5);
    }

    .header h1 {
      color: gold;
      font-size: 22px;
    }

    .certificate {
      max-width: 100%;
      margin-top: 10px;
    }

    .wrapper {
      min-height: 120vh;
    }

    /* 🔥 กล่องรูปพระเล็ก */
    .amulet-box {
      width: 120px;
      height: 140px;
      margin: 20px auto;
      border: 2px solid gold;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      text-align: center;
    }

    .amulet-box img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }

    .amulet-box span {
      display: block;
      padding: 5px;
      color: white;
    }

    /* 🔥 popup */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .popup img {
      max-width: 90%;
      max-height: 90%;
    }

    .popup span {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div class="navbar">
    <a href="#">หน้าแรก</a>
    <a href="#">ค้นหาใบรับรอง</a>
    <a href="#">ติดต่อ</a>
  </div>

  <div class="wrapper">

    <div class="header">
      <h1>ใบรับรองพระแท้</h1>
      <p>รหัสใบรับรอง: 2-4921</p>
    </div>

    <!-- รูปบัตร -->
    <img src="./2-4921.png" class="certificate">

    <!-- 🔥 ช่องรูปพระเล็ก -->
    <p>รูปภาพประกอบเพิ่มเติมของพระเครื่อง (1 รูป)</p>

    <div class="amulet-box" onclick="openPopup()">
      <img src="./2-4921b.png">
      <span>2-4921</span>
    </div>

  </div>

  <!-- 🔥 popup รูปใหญ่ -->
  <div class="popup" id="popup">
    <span onclick="closePopup()">✖</span>
    <img src="./2-4921b.png">
  </div>

  <script>
    function openPopup() {
      document.getElementById("popup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
