<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สมาคมพระเครื่อง</title>

<style>

/* 🔥 พื้นฐาน + พื้นหลังภาพยาว */
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  color:#fff;

  background:#000;
  background-image:url("images/bg8.png");
  background-repeat:no-repeat;

  /* ⭐ สำคัญ — ใช้ความสูงจริงของภาพ */
  background-size:100% auto;

  background-position:top center;
  background-attachment:scroll;
}

/* ❌ ปิด section เดิม (ไม่ใช้แล้ว) */
.section{
  display:none;
}

/* ⭐ สร้างพื้นที่ยาวให้เลื่อนได้ตามภาพ */
.page-spacer{
  height:5000px; /* ปรับตามความยาวภาพ */
}

/* ☰ ปุ่มเมนูใหญ่ */
.menu-btn{
  position:fixed;
  top:15px;
  right:15px;

  background:linear-gradient(#ffd86b,#d4af37);
  color:#4b3900;

  font-size:34px;
  width:64px;
  height:64px;

  text-align:center;
  line-height:64px;

  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.6);

  z-index:9999;
  cursor:pointer;
}

/* 🌐 ปุ่มภาษา */
.lang-box{
  position:fixed;
  top:20px;
  right:95px;

  background:rgba(0,0,0,0.7);
  padding:6px 12px;
  border-radius:8px;
  z-index:9999;
}

.lang-box span{
  cursor:pointer;
  padding:4px 6px;
}

.lang-box span:hover{
  color:#ffd86b;
}

/* 📜 เมนูด้านข้าง */
.side-menu{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:linear-gradient(to bottom,#3b2f00,#0f0e02);
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
  z-index:9998;
}

.side-menu.active{
  right:0;
}

.menu-title{
  color:#ffd86b;
  font-size:22px;
  margin:25px 0 10px;
  border-bottom:1px solid #ffd86b;
  padding-bottom:6px;
  font-weight:bold;
}

.side-menu a{
  display:block;
  color:#fff;
  text-decoration:none;
  padding:12px 0;
  font-size:18px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.side-menu a:hover{
  color:#ffd86b;
}

</style>
</head>

<body>

<!-- 🌐 ภาษา -->
<div class="lang-box">
  <span onclick="setLang('th')">TH</span> |
  <span onclick="setLang('en')">EN</span>
</div>

<!-- ☰ ปุ่มเปิดเมนู -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- 📜 เมนู -->
<div class="side-menu" id="menu">

  <div class="menu-title">หน้าหลัก</div>

  <a href="https://www.samakomphra.com/page/home/views/w4e254g4i5e5e4h4c2e444x2r2d2d494r5r4g5i4m5b2c4e274u214u2r324a2z5i4n5n4k404j4i4q4a4e2z2s286">ประวัติ</a>

  <a href="https://www.samakomphra.com/page/home/views/w4e254g4i5e5e4h4c2e444r2h2g454i4y554q5d4s3z2o3u244w224e214s3m4m5e456j404e4l4l4d4f223p2u4">คณะกรรมการ</a>

  <a href="#">ติดต่อเรา</a>

  <div class="menu-title">ใบรับรองพระแท้</div>

  <a href="#">ค้นหาบัตรรับรองพระแท้</a>

</div>

<!-- ⭐ พื้นที่ยาวตามภาพ -->
<div class="page-spacer"></div>

<script>

function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

function setLang(lang){
  alert("ระบบเปลี่ยนภาษา (ตัวอย่าง)");
}

</script>

</body>
</html>
