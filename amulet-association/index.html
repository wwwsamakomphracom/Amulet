<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรอง</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;

    /* 🔥 พื้นหลัง (แก้ path ให้ตรง) */
    background-image: url('amulet-association/images/bg1.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔥 กล่องกลาง */
.container {
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    color: white;
}

input {
    padding: 10px;
    width: 250px;
    font-size: 16px;
    margin-top: 10px;
}

button {
    padding: 10px 20px;
    background: gold;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.result {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h2>ค้นหาใบรับรองพระแท้</h2>

    <input type="text" id="code" placeholder="กรอกรหัสใบรับรอง">
    <br>
    <button onclick="search()">ค้นหา</button>

    <div class="result" id="result"></div>
</div>

<script>
function search() {
    const code = document.getElementById("code").value;

    const data = {
        "1234": "พระแท้",
        "5678": "พระแท้",
        "9999": "ปลอม"
    };

    if(data[code]) {
        document.getElementById("result").innerHTML = "ผล: " + data[code];
    } else {
        document.getElementById("result").innerHTML = "❌ ไม่พบข้อมูล";
    }
}
</script>

</body>
</html>
