<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมาคมผู้นิยมพระเครื่องพระบูชาไทย</title>

<style>

/* ===== พื้นหลังมือถือ ===== */
body{
margin:0;
font-family:Tahoma, sans-serif;
color:#fff;

/* ⭐ ทำให้ภาพพอดอมือถือ */
background:#000 url("images/bg8.png") no-repeat top center;
background-size:cover;     /* เต็มจอ */
background-attachment:scroll;

overflow-x:hidden;
}

/* ===== ปุ่ม 3 ขีด ===== */
.menu-btn{
position:fixed;
top:15px;
right:15px;
background:#fff;
color:#000;
font-size:22px;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
z-index:10000;
box-shadow:0 0 10px rgba(0,0,0,0.9);
}

/* ===== เมนูด้านข้าง ===== */
.side-menu{
position:fixed;
top:0;
right:-100%;          /* ซ่อนสนิท */
width:80%;
max-width:320px;
height:100%;
background:#111;
transition:0.35s;
padding-top:70px;
z-index:9999;
overflow-y:auto;
border-left:2px solid gold;
}

/* ⭐ เปิดเมนู */
.side-menu.open{
right:0;
}

/* ===== ลิงก์เมนู ===== */
.side-menu a{
display:block;
padding:15px 20px;
color:#fff;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.15);
font-weight:bold;
}

.side-menu a:hover{
background:#222;
color:#ffd700;
}

/* ===== กล่องเนื้อหา ===== */
.wrapper{
width:95%;
max-width:1000px;
margin:80px auto;
background:rgba(0,0,0,0.75);
box-shadow:0 0 25px rgba(0,0,0,1);
}

/* ===== หัวเว็บ ===== */
.header{
background:#000;
color:#ffd700;
text-align:center;
padding:22px;
border-bottom:3px solid gold;
font-size:22px;
font-weight:bold;
}

/* ===== Section ===== */
.section{
padding:60px 20px;
border-bottom:1px solid rgba(255,255,255,0.2);
min-height:450px;
}

.section h2{
color:#ffd700;
margin-top:0;
}

/* ===== Footer ===== */
.footer{
background:#000;
color:#ccc;
text-align:center;
padding:25px;
}

</style>
</head>

<body>

<!-- ⭐ ปุ่ม 3 ขีด -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- ⭐ เมนูเด้ง -->
<div class="side-menu" id="menu">

<a href="#home">หน้าแรก</a>
<a href="#history">ประวัติ</a>
<a href="#board">คณะกรรมการ</a>
<a href="#news">ข่าวสาร</a>
<a href="#calendar">ปฏิทินประกวด</a>
<a href="#popular">ยอดนิยม</a>
<a href="#chill">สมาคมชวนชิล</a>
<a href="#deep">เจาะลึกพระ</a>
<a href="#teacher">แนะนำอาจารย์</a>
<a href="#ancient">อมตะพระกรุ</a>
<a href="#encyclopedia">สารานุกรม</a>
<a href="#heritage">มรดกสยาม</a>
<a href="#shop">ร้านเด่น</a>
<a href="#video">วีดีโอ</a>
<a href="#certificate">ออกใบรับรอง</a>
<a href="#rules">กติกา</a>

<div class="footer">
© สมาคมผู้นิยมพระเครื่องพระบูชาไทย
</div>

</div>

<script>

/* ⭐ เปิด-ปิดเมนู */
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

/* ⭐ กดเมนูแล้วปิดอัตโนมัติ */
document.querySelectorAll(".side-menu a").forEach(link=>{
link.addEventListener("click",()=>{
document.getElementById("menu").classList.remove("open");
});
});

</script>

</body>
</html>
