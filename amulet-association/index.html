<!DOCTYPE html>

<head>

<title>สมาคมพระเครื่อง</title>

<style>

/* ===== พื้นหลังภาพยาว ===== */
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  color:#fff;

  background:#000 url("images/bg8.png") no-repeat center top;
  background-size:100% auto;
}

/* ===== ปุ่มเมนู 3 ขีด ===== */
.menu-btn{
  position:fixed;
  top:15px;
  right:15px;
  font-size:30px;
  color:gold;
  cursor:pointer;
  z-index:9999;
  background:rgba(0,0,0,0.7);
  padding:5px 12px;
  border-radius:6px;
}

/* ===== เมนูสไลด์ ===== */
.side-menu{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#111;
  overflow-y:auto;
  transition:0.3s;
  z-index:9998;
  padding:20px;
  box-shadow:-5px 0 20px #000;
}

/* ⭐ เมื่อเปิดเมนู */
.side-menu.open{
  right:0;
}

/* ===== หัวข้อ ===== */
.menu-title{
  color:gold;
  font-weight:bold;
  margin-top:18px;
  margin-bottom:6px;
  font-size:18px;
}

/* ===== ลิงก์เมนู ===== */
.side-menu a{
  display:block;
  color:#fff;
  text-decoration:none;
  padding:8px 0;
  border-bottom:1px solid #333;
  font-size:14px;
}

.side-menu a:hover{
  color:gold;
}

/* ===== พื้นที่เนื้อหา (กันเมนูบัง) ===== */
.content{
  padding:80px 20px;
  text-align:center;
}

h1{
  color:gold;
}

</style>
</head>
