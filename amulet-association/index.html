<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สมาคมพระเครื่อง</title>

<style>
body{
margin:0;
font-family:tahoma;

}

/* ===== เมนู ===== */
.nav{

top:0;
width:100%;
background:#111;
color:white;
display:flex;
justify-content:space-between;
padding:12px 20px;
z-index:999;
}

.menu a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.menu a:hover{
color:gold;
}

/* ===== section ===== */
section{
padding:100px 20px;
min-height:100vh;
border-bottom:1px solid #ddd;
}

h1{
color:#b30000;
}

/* ===== language ===== */
.lang button{
margin-left:5px;
padding:5px 10px;
cursor:pointer;
}
</style>

<body>

<div class="nav">

document.querySelectorAll('[data-th]').forEach(el=>{

});
}
