<style>

/* ===== พื้นฐาน ===== */
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#000;
  overflow-x:hidden;
}

/* ===== ปุ่มเมนูบน ===== */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#d4af37;
  display:flex;
  align-items:center;
  padding-left:15px;
  z-index:9999;
}

.menu-btn{
  font-size:28px;
  color:#fff;
  cursor:pointer;
  margin-right:12px;
}

.menu-text{
  color:#fff;
  font-size:20px;
}

/* ===== เมนู Slide ===== */
.sidebar{
  position:fixed;
  top:0;
  left:-320px;
  width:320px;
  height:100%;
  background:#2b2100;
  color:#fff;
  overflow-y:auto;
  transition:.4s;
  z-index:9998;
}

.sidebar.active{
  left:0;
}

/* ===== หัวข้อหมวด ===== */
.category{
  color:#ffd700;
  font-weight:bold;
  padding:18px 20px 10px;
  border-bottom:1px solid #8a6f1a;
  font-size:20px;
}

/* ===== รายการเมนู ===== */
.sidebar a{
  display:block;
  padding:14px 22px;
  color:#fff;
  text-decoration:none;
  font-size:18px;
}

.sidebar a:hover{
  background:#d4af37;
  color:#000;
}

/* ===== พื้นหลังแต่ละภาพ ===== */
.section{
  width:100%;
  min-height:100vh;
  background-size:contain;
  background-position:center top;
  background-repeat:no-repeat;
}

/* เว้นพื้นที่ topbar */
.content{
  margin-top:60px;
}

</style>
</head>
