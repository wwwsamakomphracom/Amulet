<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมาคมผู้นิยมพระเครื่องพระบูชาไทย</title>

<style>

/* ===== พื้นหลัง: รูปอย่างเดียว ===== */
body{
margin:0;
font-family:Tahoma, sans-serif;
color:#fff;

/* ⭐ ไม่มีสีดำ ไม่มีพื้นหลังอื่น */
background:url("images/bg8.png") no-repeat top center;
background-size:100% auto;

overflow-x:hidden;
}

/* ===== ปุ่มเมนู 3 ขีด ===== */
.menu-btn{
position:fixed;
top:12px;
right:12px;
background:#fff;
color:#000;
font-size:20px;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
z-index:9999;
box-shadow:0 0 8px rgba(0,0,0,0.8);
}

/* ===== เมนูเด้ง ===== */
.side-menu{
position:fixed;
top:0;
right:-320px;
width:300px;
height:100%;
background:#111;
transition:0.3s;
padding-top:70px;
z-index:9998;
overflow-y:auto;
border-left:2px solid gold;
}

.side-menu a{
display:block;
padding:14px 20px;
color:#fff;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.15);
font-weight:bold;
}

.side-menu a:hover{
background:#222;
color:#ffd700;
}

.side-menu.open{
right:0;
}

</style>
</head>

<body>

<!-- ⭐ ปุ่ม 3 ขีด -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- ⭐ เมนู -->
<div class="side-menu" id="menu">

<a href="#home">หน้าแรก</a>
<a href="#history">ประวัติ</a>
<a href="#board">คณะกรรมการ</a>
<a href="#news">ข่าวสาร</a>
<a href="#calendar">ปฏิทินประกวด</a>
<a href="#popular">ยอดนิยม</a>
<a href="#chill">สมาคมชวนชิล</a>
<a href="#deep">เจาะลึกพระ</a>
<a href="#teacher">แนะนำอาจารย์</a>
<a href="#ancient">อมตะพระกรุ</a>
<a href="#encyclopedia">สารานุกรม</a>
<a href="#heritage">มรดกสยาม</a>
<a href="#shop">ร้านเด่น</a>
<a href="#video">วีดีโอ</a>
<a href="#certificate">ออกใบรับรอง</a>
<a href="#rules">กติกา</a>

</div>

<!-- ⭐ พื้นที่ให้เลื่อน -->
<div style="height:3500px;"></div>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
