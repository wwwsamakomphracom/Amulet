<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สมาคมผู้นิยมพระเครื่องพระบูชาไทย</title>

<style>

body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#000;
}

/* ⭐ ภาพแต่ละหน้าเต็มจอมือถือ */
.section{
  width:100%;
  height:100vh;
  background-size:cover;
  background-position:top center;
  background-repeat:no-repeat;
}

/* ========================= */
/* 🌐 ปุ่มเปลี่ยนภาษา */
/* ========================= */

.lang-switch{
  position:fixed;
  top:15px;
  right:75px;   /* อยู่เหนือปุ่ม Home */
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:6px 10px;
  border-radius:4px;
  font-size:14px;
  z-index:9999;
}

.lang-switch span{
  cursor:pointer;
  margin:0 5px;
}

/* ========================= */
/* ☰ ปุ่มเมนู Home */
/* ========================= */

.menu-btn{
  position:fixed;
  top:15px;
  right:15px;
  background:#d4af37;
  color:#fff;
  font-size:28px;
  width:48px;
  height:48px;
  text-align:center;
  line-height:48px;
  border-radius:4px;
  z-index:9999;
  cursor:pointer;
}

/* ========================= */
/* 📜 เมนูด้านข้าง */
/* ========================= */

.side-menu{
  position:fixed;
  top:0;
  right:-320px;
  width:300px;
  height:100%;
  background:#1a1406;
  padding:20px;
  transition:0.3s;
  z-index:9998;
  overflow-y:auto;
}

.side-menu.active{
  right:0;
}

/* ⭐ หัวข้อเมนู */
.menu-title{
  color:#d4af37;
  font-size:20px;
  margin:20px 0 10px;
  border-bottom:1px solid #d4af37;
  padding-bottom:5px;
}

/* ⭐ รายการเมนู */
.side-menu a{
  display:block;
  color:#ffffff;
  text-decoration:none;
  padding:8px 0;
  font-size:18px;
}

.side-menu a:hover{
  color:#d4af37;
}

</style>
</head>

<body>

<!-- 🌐 ปุ่มภาษา -->
<div class="lang-switch">
  <span onclick="setLang('th')">🇹🇭 TH</span> |
  <span onclick="setLang('en')">🇬🇧 EN</span>
</div>

<!-- ☰ ปุ่มเมนู -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- 📜 เมนูด้านข้าง -->
<div class="side-menu" id="menu">

  <div class="menu-title">หน้าหลัก</div>
  <a href="#">ประวัติ</a>
  <a href="#">คณะกรรมการ</a>
  <a href="#">ติดต่อเรา</a>

  <div class="menu-title">ข่าวสารสมาคม</div>
  <a href="#">แวดวงพระเครื่อง</a>
  <a href="#">ปฏิทินงานประกวด</a>
  <a href="#">ยอดนิยมจากคมเลนส์</a>

  <div class="menu-title">สาระพระเครื่อง</div>
  <a href="#">เจาะลึกเรื่องพระเครื่อง</a>
  <a href="#">แนะนำอาจารย์</a>
  <a href="#">อมตะพระกรุ</a>

  <div class="menu-title">ใบรับรองพระแท้</div>
  <a href="certificate/">ค้นหาใบรับรองพระแท้</a>
  <a href="#">ขั้นตอนการออกใบรับรอง</a>
  <a href="#">กติกาการออกใบรับรอง</a>

</div>

<!-- 🖼 BG1 → BG4 -->

<div class="section" style="background-image:url('images/BG1.png');"></div>
<div class="section" style="background-image:url('images/BG2.png');"></div>
<div class="section" style="background-image:url('images/BG3.png');"></div>
<div class="section" style="background-image:url('images/BG4.png');"></div>

<script>

/* ☰ เปิดปิดเมนู */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

/* 🌐 เปลี่ยนภาษา (เดโม) */
function setLang(lang){
  if(lang === "th"){
    alert("เปลี่ยนเป็นภาษาไทย");
  }else{
    alert("Switch to English");
  }
}

</script>

</body>
</html>
