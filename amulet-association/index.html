/* ===== พื้นฐาน ===== */
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#000;
  overflow-x:hidden;
}

/* ===== ปุ่มบนขวา ===== */
.top-bar{
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:10px;
  z-index:9999;
}

/* ปุ่มภาษา */
.lang-btn{
  background:#000;
  color:#fff;
  border:2px solid #FFD700;
  padding:6px 10px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
}

/* ปุ่มเมนู 3 ขีด */
.menu-btn{
  width:40px;
  height:32px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  cursor:pointer;
}

.menu-btn span{
  height:5px;
  background:#FFD700;
  border-radius:3px;
}

/* ===== เมนู Slide ===== */
.side-menu{
  position:fixed;
  top:0;
  right:-320px;
  width:320px;
  height:100%;
  background:#111;
  padding-top:80px;
  transition:0.4s;
  z-index:9998;
  overflow-y:auto;
}

.side-menu.active{
  right:0;
}

.side-menu a{
  display:block;
  padding:16px 22px;
  color:#fff;
  text-decoration:none;
  border-bottom:1px solid #333;
  font-size:16px;
}

.side-menu a:hover{
  background:#FFD700;
  color:#000;
}

/* ===== ภาพพื้นหลัง ===== */
.section{
  width:100%;
  height:100vh;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ===== จุดคลิก BG1 ===== */
.click-area{
  position:absolute;
  background:rgba(255,215,0,0.3);
  border:2px solid #FFD700;
  cursor:pointer;
}

/* ปรับตำแหน่งตรงช่องเหลืองใน BG1 */
.bg1-click{
  top:38%;
  left:20%;
  width:60%;
  height:10%;

</style>
