<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรองพระแท้</title>

<style>

body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#000;
}

/* ⭐ กล่องภาพ */
.wrapper{
  position:relative;
  width:100%;
}

/* ⭐ ภาพพื้นหลังจริง */
.wrapper img{
  width:100%;
  height:auto;
  display:block;
}

/* 🔎 ช่องค้นหา */
.search-box{
  position:absolute;

  /* 🔥 ปรับตำแหน่งให้ตรงภาพ */
  top:4.5%;     /* เปอร์เซ็นต์ = แม่นในทุกมือถือ */
  left:50%;
  transform:translateX(-50%);

  width:85%;
  max-width:520px;

  display:flex;
  box-shadow:0 0 12px rgba(0,0,0,0.6);
}

/* ช่องกรอก */
.search-box input{
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  outline:none;
}

/* ปุ่มค้นหา */
.search-box button{
  width:60px;
  border:none;
  background:#caa24c;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.search-box button:hover{
  background:#b8923f;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- 🖼 ภาพพื้นหลัง -->
  <img src="certificate-bg.png" alt="ใบรับรอง">

  <!-- 🔎 ช่องค้นหา -->
  <form class="search-box" action="#">
    <input type="text" placeholder="ค้นหาจากเลขบัตร xxxx-xxxxx">
    <button type="submit">🔍</button>
  </form>

</div>

</body>
</html>
