<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรองพระแท้</title>

<style>

/* 🔱 พื้นหลังเหมือนหน้าเว็บหลัก */
body{
  margin:0;
  font-family:Tahoma, sans-serif;

  background:
    radial-gradient(circle at top, rgba(255,220,120,0.6), transparent 60%),
    linear-gradient(to bottom,#b38b00,#1b1a05);

  color:#fff;
}

/* 🔝 Header */
.header{
  background:linear-gradient(to bottom,#f4d06f,#a67c00);
  padding:15px;
  text-align:center;
  color:#4b3900;
  font-weight:bold;
  font-size:20px;
}

/* 📦 กล่องค้นหา */
.container{
  max-width:500px;
  margin:40px auto;
  background:#3b3200;
  padding:25px;
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,0.7);
  text-align:center;
}

/* ช่องกรอก */
input{
  width:90%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin:15px 0;
}

/* ปุ่มค้นหา */
button{
  background:linear-gradient(to right,#e6c55a,#b38b00);
  color:#4b3900;
  font-size:18px;
  font-weight:bold;
  border:none;
  padding:12px 30px;
  border-radius:10px;
  cursor:pointer;
}

/* ผลลัพธ์ */
.result{
  margin-top:25px;
  font-size:18px;
}

.result img{
  width:100%;
  border-radius:12px;
  margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
  🔎 ค้นหาใบรับรองพระแท้
</div>

<div class="container">

  <p>กรอกเลขใบรับรอง</p>

  <input id="code" placeholder="เช่น OB754419535TH">

  <br>

  <button onclick="searchCert()">ค้นหา</button>

  <div class="result" id="result"></div>

</div>

<script>

function searchCert(){

  const code = document.getElementById("code").value.trim();
  const box = document.getElementById("result");

  if(code === "OB754419535TH"){

    box.innerHTML = `
      <p>✅ พบข้อมูลใบรับรอง</p>
      <img src="../images/cert1.png">
    `;

  }else{

    box.innerHTML = "❌ ไม่พบข้อมูล";

  }
}

</script>

</body>
</html>
