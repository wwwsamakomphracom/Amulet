<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรองสมาคมพระเครื่อง</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body, html {
  height:100%;
  font-family: Tahoma, sans-serif;
  background-color: #000;
  overflow-x: hidden;
}

/* 🔹 ช่องค้นหา */
.search-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 450px;
  height: 50px;
  display: flex;
  z-index: 1000;
}

.search-container input {
  width: calc(100% - 50px);
  padding: 0 10px;
  border: 2px solid #d4af37;
}

.search-container button {
  width: 50px;
  background: #d4af37;
  border: none;
  cursor: pointer;
}

/* 🔹 ภาพพื้นหลัง */
.image-container {
  width: 100%;
  min-height: 1903px;
  background-image: url("containerbg.png"); /* ✅ ชื่อไฟถูก */
  background-repeat: no-repeat;
  background-position: top center;
  background-size: 100% auto;
}
</style>

</head>

<body>

<div class="search-container">
  <input type="text" placeholder="ค้นหาจากเลขบัตรสมาคม">
  <button>🔍</button> <!-- ใช้ emoji แทน -->
</div>

<!-- ✅ แก้ class ให้ถูก -->
<div class="image-container"></div>

</body>
</html>
