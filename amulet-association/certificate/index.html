<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรองพระแท้</title>

<style>

/* 🔥 พื้นหลังภาพสมาคม เลื่อนขึ้นลงได้ */
body{
  margin:0;
  font-family:Tahoma, sans-serif;

  background:
    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.65)),
    url("../images/certificate-bg.png") no-repeat center top;

  background-size:cover;

  color:#fff;
}

/* 🔝 หัวข้อ */
.header{
  text-align:center;
  padding:25px 10px;
  font-size:24px;
  font-weight:bold;
  background:rgba(0,0,0,0.6);
}

/* 📦 กล่องค้นหา */
.search-box{
  max-width:500px;
  margin:60px auto;
  background:rgba(0,0,0,0.75);
  padding:30px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.8);
}

/* ช่องกรอก */
input{
  width:90%;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:15px 0;
}

/* ปุ่ม */
button{
  background:#e6c55a;
  color:#4b3900;
  font-size:18px;
  font-weight:bold;
  border:none;
  padding:12px 28px;
  border-radius:10px;
  cursor:pointer;
}

/* 📄 ผลลัพธ์ */
.result{
  max-width:500px;
  margin:30px auto 80px;
  background:rgba(0,0,0,0.75);
  padding:25px;
  border-radius:18px;
  min-height:200px;
  text-align:center;
}

</style>
</head>

<body>

<div class="header">
🔎 ระบบค้นหาใบรับรองพระแท้ สมาคม
</div>

<div class="search-box">

<p>กรอกเลขใบรับรอง</p>

<input id="code" placeholder="เช่น OB754419535TH">

<br>

<button onclick="searchCert()">ค้นหา</button>

</div>

<div class="result" id="result">
ผลการค้นหาจะแสดงที่นี่
</div>

<script>

function searchCert(){

  const code = document.getElementById("code").value.trim();
  const box = document.getElementById("result");

  if(code === ""){
    box.innerHTML = "⚠️ กรุณากรอกเลขใบรับรอง";
  }else{
    box.innerHTML = "🔍 ไม่พบข้อมูล (ยังไม่ได้เชื่อมฐานข้อมูล)";
  }

}

</script>

</body>
</html>
