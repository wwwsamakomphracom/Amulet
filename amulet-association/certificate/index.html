<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรอง</title>

<style>

/* ===== พื้นหลัง ===== */
body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#000;
}

/* ⭐ กล่องภาพ */
.bg-box{
  position:relative;
  width:100%;
  max-width:1000px;
  margin:auto;
}

/* ⭐ ภาพพื้นหลัง */
.bg-box img{
  width:100%;
  display:block;
}

/* ===== พื้นที่คลิก ===== */
.click-area{
  position:absolute;

  /* ⭐ ปรับตำแหน่งช่องค้นหา */
  top:72%;
  left:8%;
  width:84%;
  height:8%;

  background:rgba(255,0,0,0);
  cursor:pointer;
}

</style>
</head>

<body>

<div class="bg-box">

<!-- ⭐ ใช้ชื่อไฟล์ที่ถูกต้อง -->
<img src="images/certificate-bg.png" alt="certificate">

<!-- ⭐ พื้นที่คลิก -->
<a href="search-result.html" class="click-area"></a>

</div>

</body>
</html>
