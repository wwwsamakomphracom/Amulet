<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรองสมาคมพระเครื่อง</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #000;
  font-family: Tahoma, sans-serif;
}

/* 🔍 ช่องค้นหา */
.search-container {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  max-width: 380px;
  height: 45px;
  display: flex;
}

.search-container input {
  flex: 1;
  padding: 0 10px;
  font-size: 14px;
  border: 2px solid #d4af37;
  border-right: none;
  outline: none;
}

.search-container button {
  width: 45px;
  background: #d4af37;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

.image-container {
  width: 100%;
  text-align: center;
}
</style>

</head>

<body>

<div class="search-container">
  <input id="searchInput" type="text" placeholder="ค้นหาจากเลขบัตร. ××××-××××">
  <button onclick="searchCert()">🔍</button>
</div>

<div class="image-container"></div>

<script>
function searchCert() {
  let value = document.getElementById("searchInput").value.trim();

  // ✅ ล็อกเฉพาะเลขนี้
  if (value === "0975-33671") {
    window.location.href = "https://verify.amulettags.online/0975-33671/";
  } else {
    alert("ไม่พบข้อมูลเลขบัตรนี้");
  }
}

// กด Enter ได้
document.getElementById("searchInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchCert();
  }
});
</script>

</body>
</html>
