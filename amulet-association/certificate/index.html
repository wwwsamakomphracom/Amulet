<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรองพระแท้</title>

<style>

body{
  margin:0;
  font-family:Tahoma, sans-serif;
  background:#000;
}

/* ⭐ พื้นหลังเต็มหน้า */
.bg{
  width:100%;
  min-height:100vh;
  background:url("../images/certificate-bg.png") center top no-repeat;
  background-size:100% auto;  /* สำคัญ: ให้ยาวตามภาพ */
  position:relative;
}

/* ⭐ กล่องช่องค้นหา */
.search-box{
  position:absolute;

  /* 🔥 ปรับตำแหน่งตามภาพ */
  top:180px;
  left:50%;
  transform:translateX(-50%);

  width:85%;
  max-width:520px;

  display:flex;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* ช่องกรอก */
.search-box input{
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  outline:none;
}

/* ปุ่มค้นหา */
.search-box button{
  width:60px;
  border:none;
  background:#caa24c;
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

/* เอฟเฟกต์กด */
.search-box button:hover{
  background:#b8923f;
}

</style>
</head>

<body>

<div class="bg">

  <!-- 🔎 ช่องค้นหา -->
  <form class="search-box" action="#">
    <input type="text" placeholder="ค้นหาจากเลขบัตร xxxx-xxxxx">
    <button type="submit">🔍</button>
  </form>

</div>

</body>
</html>
