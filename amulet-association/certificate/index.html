<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรองสมาคมพระเครื่อง</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Tahoma, sans-serif;

  /* 🖼️ พื้นหลังเต็มจอ */
  background-image: url("certificate1.png");
  background-size: contain; /* ให้เห็นทั้งภาพ */
  background-repeat: no-repeat;
  background-position: top center;
  background-color: #000;

  /* ให้เลื่อนลงได้ */
  min-height: 200vh;
}

/* 🔍 ช่องค้นหา (เล็กลง + ลงล่าง) */
.search-container {
  position: fixed;
  bottom: 40px; /* ย้ายลงล่าง */
  left: 50%;
  transform: translateX(-50%);
  width: 75%;
  max-width: 300px; /* เล็กลง */
  height: 40px;
  display: flex;
  z-index: 1000;
}

.search-container input {
  flex: 1;
  padding: 0 8px;
  font-size: 13px; /* เล็กลง */
  border: 2px solid #d4af37;
  border-right: none;
  outline: none;
}

.search-container button {
  width: 40px;
  background: #d4af37;
  border: none;
  cursor: pointer;
  font-size: 14px;
}
</style>

</head>

<body>

<!-- 🔍 ช่องค้นหา -->
<div class="search-container">
  <input id="searchInput" type="text" placeholder="ค้นหาจากเลขบัตร. ××××-××××">
  <button onclick="searchCert()">🔍</button>
</div>

<script>
// 🔍 ค้นหา
function searchCert() {
  let value = document.getElementById("searchInput").value.trim();

  if (value === "0975-33671") {
    window.location.href = "https://verify.amulettags.online/0975-33671/";
  } else {
    alert("ไม่พบข้อมูลเลขบัตรนี้");
  }
}

// ⌨️ Enter
document.getElementById("searchInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchCert();
  }
});
</script>

</body>
</html>
