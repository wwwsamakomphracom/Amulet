<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค้นหาใบรับรองพระแท้</title>

<style>

/* 🔱 พื้นหลังทอง เลื่อนขึ้นลงได้ */
body{
  margin:0;
  font-family:Tahoma, sans-serif;

  background:
    radial-gradient(circle at top, rgba(255,220,120,0.6), transparent 60%),
    linear-gradient(to bottom,#b38b00,#1b1a05);

  color:#fff;
}

/* 🔝 แถบหัว */
.header{
  background:linear-gradient(to bottom,#f4d06f,#a67c00);
  padding:18px;
  text-align:center;
  color:#4b3900;
  font-weight:bold;
  font-size:20px;
  position:sticky;
  top:0;
}

/* 📦 กล่องค้นหา */
.search-box{
  max-width:520px;
  margin:40px auto;
  background:#3b3200;
  padding:25px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.7);
  text-align:center;
}

/* ช่องกรอก */
input{
  width:90%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin:15px 0;
}

/* ปุ่ม */
button{
  background:linear-gradient(to right,#e6c55a,#b38b00);
  color:#4b3900;
  font-size:18px;
  font-weight:bold;
  border:none;
  padding:12px 30px;
  border-radius:10px;
  cursor:pointer;
}

/* 📄 พื้นที่ผลลัพธ์ */
.result{
  max-width:520px;
  margin:20px auto 80px;
  background:#3b3200;
  padding:20px;
  border-radius:18px;
  box-shadow:0 12px 30px rgba(0,0,0,0.6);
  min-height:200px;
  text-align:center;
}

</style>
</head>

<body>

<div class="header">
  🔎 ระบบค้นหาใบรับรองพระแท้
</div>

<div class="search-box">

  <p>กรอกเลขใบรับรอง</p>

  <input id="code" placeholder="เช่น OB754419535TH">

  <br>

  <button onclick="searchCert()">ค้นหา</button>

</div>

<div class="result" id="result">
  ผลการค้นหาจะแสดงที่นี่
</div>

<script>

function searchCert(){

  const code = document.getElementById("code").value.trim();
  const box = document.getElementById("result");

  if(code === ""){
    box.innerHTML = "⚠️ กรุณากรอกเลขใบรับรอง";
  }else{
    box.innerHTML = "🔍 กำลังค้นหา… (จะเชื่อมฐานข้อมูลภายหลัง)";
  }
}

</script>

</body>
</html>
