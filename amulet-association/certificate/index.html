<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรองพระแท้</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Tahoma,sans-serif;
}

/* ⭐ กล่องภาพ */
.bg-box{
  position:relative;
  max-width:1000px;
  margin:auto;
}

/* ⭐ ภาพพื้นหลัง */
.bg-box img{
  width:100%;
  display:block;
}

/* ⭐ ช่องกรอก */
.input-box{
  position:absolute;
  top:71%;
  left:8%;
  width:60%;
  height:8%;
  font-size:18px;
  padding:8px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.9);
}

/* ⭐ ปุ่มค้นหา */
.search-btn{
  position:absolute;
  top:71%;
  right:8%;
  width:20%;
  height:8%;
  border:none;
  background:rgba(0,0,0,0);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg-box">

  <!-- ⭐ Path ถูกต้องสำหรับโครงสร้างคุณ -->
  <img src="../images/certificate-bg.png" alt="search">

  <!-- ⭐ ช่องใส่เลข -->
  <input type="text" class="input-box" placeholder="กรอกเลขใบรับรอง">

  <!-- ⭐ ปุ่มค้นหา -->
  <button class="search-btn" onclick="goSearch()"></button>

</div>

<script>
function goSearch(){
  const code = document.querySelector(".input-box").value;

  if(code.trim() !== ""){
    // ⭐ เตรียมไว้ใส่ลิงก์จริงในอนาคต
    alert("ค้นหาเลข: " + code);
  }
}
</script>

</body>
</html>
