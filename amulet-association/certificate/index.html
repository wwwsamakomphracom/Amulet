<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรองสมาคมพระเครื่อง</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body, html {
    height:100%;
    font-family: Tahoma, sans-serif;
    background-color: #000; /* พื้นหลังดำเวลาภาพโหลดช้า */
    overflow-x: hidden;
  }

  /* 🔹 ช่องค้นหา */
  .search-container {
    position: fixed; /* อยู่เหนือภาพ */
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 450px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
  }

  .search-container input[type="text"] {
    width: calc(100% - 50px);
    height: 100%;
    padding: 0 10px;
    font-size: 16px;
    border: 2px solid #d4af37;
    border-radius: 4px;
    background-color: #fff;
    color: #000;
  }

  .search-container input::placeholder { color: #888; }

  .search-container button {
    width: 50px;
    height: 50px;
    background-color: #d4af37;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .search-container button img {
    width: 24px;
    height: 24px;
    filter: brightness(0) invert(1); /* แว่นขยายสีขาว */
  }

  /* 🔹 ภาพพื้นหลังสมาคม */
  .image-container {
    width: 100%;
    min-height: 1903px; /* ความสูงตามภาพ */
    background-image: url("container.png"); /* ใช้ไฟล์ container.png */
    background-repeat: no-repeat;
    background-position: top center;
    background-size: 100% auto; /* กว้างเต็ม สูงตามสัดส่วน */
    background-attachment: scroll; /* เลื่อนตามหน้า */
  }

  @media (max-width: 768px) {
    .search-container { width: 90%; height: 40px; }
    .search-container input[type="text"] { font-size: 14px; }
    .search-container button { width: 40px; height: 40px; }
    .search-container button img { width: 20px; height: 20px; }
  }
</style>
</head>
<body>

  <!-- ช่องค้นหา -->
  <div class="search-container">
    <input type="text" placeholder="ค้นหาจากเลขบัตรสมาคม">
    <button>
      <img src="images/search-icon-white.png" alt="ค้นหา">
    </button>
  </div>

  <!-- ภาพพื้นหลังสมาคม -->
  <div class="image-container"></div>

</body>
</html>
