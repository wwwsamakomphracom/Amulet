<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ค้นหาใบรับรองสมาคมพระเครื่อง</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #000;
  font-family: Tahoma, sans-serif;
}

/* 🔍 ช่องค้นหา */
.search-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 450px;
  height: 50px;
  display: flex;
  z-index: 1000;
}

.search-container input {
  flex: 1;
  padding: 0 12px;
  font-size: 16px;
  border: 2px solid #d4af37;
  border-right: none;
  outline: none;
}

.search-container button {
  width: 50px;
  background: #d4af37;
  border: none;
  cursor: pointer;
  font-size: 18px;
}

/* 🖼️ ภาพพื้นหลัง */
.image-container {
      .certificate {
      width: auto;
      max-width: 100%; /* ปรับให้พอดีกับหน้าจอแนวนอน */
      height: auto;    /* ให้สูงตามสัดส่วนจริง */
      display: block;
      margin: 0 auto;
}
</style>

</head>

<body>

<div class="search-container">
  <input type="text" placeholder="ค้นหาจากเลขบัตรสมาคม">
  <button>🔍</button>
</div>

<div class="image-container"></div>

</body>
</html>
