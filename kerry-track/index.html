<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
padding:0;
font-family:Arial;
}

.bg{
width:100%;
position:absolute;
top:0;
left:0;
z-index:1;
}

.box{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
width:80%;
}

input{
width:100%;
padding:15px;
border-radius:50px;
border:none;
font-size:18px;
}

button{
margin-top:10px;
width:100%;
padding:15px;
border-radius:50px;
border:none;
background:#333;
color:#fff;
font-size:18px;
}

</style>
</head>

<body>

<img src="mg/kex-bg.jpg" class="bg">

<div class="box">
<input type="text" id="track" placeholder="กรอกเลขพัสดุ">
<button onclick="search()">ติดตาม</button>
</div>

<script>
function search(){

var x = document.getElementById("track").value;

if(x == "TREE203396216"){
window.location.href="result.html";
}else{
alert("ไม่พบข้อมูล");
}

}
</script>

</body>
</html>
