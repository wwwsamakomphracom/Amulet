<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TREE Tracking</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
}

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
object-fit:cover;
z-index:-1;
}

.searchBox{
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%);
width:75%;
max-width:350px;
}

input{
width:100%;
padding:15px;
border-radius:30px;
border:none;
outline:none;
font-size:16px;
text-align:center;
}

button{
margin-top:15px;
width:100%;
padding:15px;
border-radius:30px;
border:none;
background:#3c3c3c;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<img src="bg.png" class="bg">

<div class="searchBox">

<input type="text" id="track"
placeholder="กรอกหมายเลขพัสดุ">

<button onclick="checkTrack()">
ติดตาม
</button>

</div>

<script>

function checkTrack(){

var input =
document.getElementById("track")
.value.trim();

var correct =
"TREE203396216";

/* 🔴 ใส่ลิงก์ตรงนี้ */
var redirectURL =
"https://ใส่ลิงก์ที่คุณต้องการ";

if(input === correct){

window.location.href =
redirectURL;

}else{

return false;

}

}

</script>

</body>
</html>
