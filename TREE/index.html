<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAG Verification</title>

<style>
body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('img/bg.png') no-repeat center center;
background-size:cover;
font-family:Arial;
}

.box{
background:#ffffffdd;
padding:30px;
border-radius:15px;
text-align:center;
}

input{
width:250px;
padding:10px;
margin-top:10px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
background:#000;
color:#fff;
border:none;
}

#result{
margin-top:15px;
font-size:18px;
color:red;
}
</style>
</head>

<body>

<div class="box">
<h2>ตรวจสอบพระ TAG</h2>

<input id="tag" placeholder="กรอกรหัส TAG">

<br>

<button onclick="checkTag()">ตรวจสอบ</button>

<div id="result"></div>
</div>

<script>
function checkTag(){

var tag=document.getElementById("tag").value;

if(tag=="TAG945728551"){
document.getElementById("result").innerHTML="✅ พบข้อมูล";
}
else{
document.getElementById("result").innerHTML="❌ ไม่พบข้อมูล";
}

}
</script>

</body>
</html>
