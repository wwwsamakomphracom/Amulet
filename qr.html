<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QR Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 320px;
      width: 100%;
    }

    img {
      width: 200px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>QR Code</h1>

    <!-- ⚠️ ชื่อไฟล์รูป QR ต้องตรง -->
    <img src="qr.png" alt="QR Code">

    <p>สแกน QR Code เพื่อยืนยันข้อมูล</p>
  </div>
</body>
</html>
