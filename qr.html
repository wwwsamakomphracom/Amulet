<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QR Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 24px;
      border-radius: 16px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
    .card img {
      width: 100%;
      border-radius: 12px;
    }
    .card h2 {
      margin: 16px 0 8px;
      font-size: 20px;
      color: #333;
    }
    .card p {
      margin: 0;
      font-size: 15px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- เปลี่ยนลิงก์รูปตรงนี้ได้ -->
    <img src="https://via.placeholder.com/300x300.png?text=YOUR+IMAGE" alt="QR Image">
    <h2>ข้อมูลการยืนยัน</h2>
    <p>หน้านี้เป็นหน้าเว็บของฉันเอง ไม่มีโฆษณา</p>
  </div>
</body>
</html>
