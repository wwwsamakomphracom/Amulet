<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมาคมพระเครื่อง - ใบรับรอง 0975-33671</title>
  <style>
    /* รีเซ็ตค่าเริ่มต้น */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Tahoma, sans-serif;
      color: #fff;
      background-color: #000; /* โทนพื้นหลังมืด */
      background-image: url("0975-33671.png");
      background-repeat: no-repeat;
      background-position: top center;
      background-size: auto; /* ใช้ขนาดจริงของภาพ ไม่ครอบตัด */
    }

    /* ให้ความสูง body ตามภาพจริง เพื่อ scroll */
    html, body {
      height: 100%;
    }

    /* ส่วน overlay / ข้อความบนภาพ */
    .header {
      width: 100%;
      text-align: center;
      padding: 30px 10px;
      background: rgba(0,0,0,0.4); /* overlay สีดำโปร่งเล็กน้อย */
    }

    .header h1 {
      color: #ffd700; /* สีทองสำหรับหัวข้อ */
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .header p {
      color: #fff; /* ข้อความสีขาว */
      font-size: 1rem;
    }

    /* ปรับให้เลื่อนตามความสูงของภาพ */
    .spacer {
      height: 1px; /* ใช้แทน scrollable body */
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>สมาคมพระเครื่อง</h1>
    <p>ใบรับรองพระแท้เลขที่ 0975-33671</p>
  </div>

  <!-- ตัวช่วยให้ scroll ตามความสูงภาพจริง -->
  <div class="spacer"></div>
</body>
</html>
