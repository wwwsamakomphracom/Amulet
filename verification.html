<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>QR Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

      background: #ffffff;

    .box img {

      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="box">
    <a href="https://qr1.me-qr.com/th/data/image-pack/5bzelqvl" target="_blank" rel="noopener noreferrer">

    <p>สแกน QR Code เพื่อยืนยันข้อมูล</p>
  </div>

</body>
</html>
